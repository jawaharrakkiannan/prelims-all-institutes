<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UPSC CSE Prelims 2026 · Question Types</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --ink:#111827;
  --paper:#fff7ed;
  --paper2:#ffedd5;
  --paper3:#fed7aa;
  --rule:#e2e8f0;
  --rule2:#94a3b8;
  --accent:#ea580c;
  --accent2:#c2410c;
  --accent-bg:rgba(234,88,12,.08);
  --accent-bg2:rgba(234,88,12,.14);
  --green:#15803d;
  --green-bg:rgba(21,128,61,.09);
  --blue:#1d4ed8;
  --blue-bg:rgba(29,78,216,.08);
  --gold:#a16207;
  --gold-bg:rgba(161,98,7,.09);
  --mono:'IBM Plex Mono',monospace;
  --serif:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --display:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:var(--serif);
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  line-height:1.7;
  background-image:repeating-linear-gradient(
    transparent 0,transparent 1.65rem,
    rgba(180,120,60,.06) 1.65rem,rgba(180,120,60,.06) calc(1.65rem + 1px)
  );
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.038;
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/></filter><rect width='256' height='256' filter='url(%23n)'/></svg>");
}

/* ── HEADER ── */
header{text-align:center;padding:2rem 2rem 0;margin-bottom:2rem}
.masthead-rule{border:none;border-top:3px solid var(--ink);border-bottom:1px solid var(--ink);height:5px;margin:2rem 0 1.25rem;background:transparent}
.masthead-rule.bottom{margin:1.25rem 0 0}
header h1{font-family:var(--display);font-size:clamp(1.8rem,4vw,3rem);font-weight:700;color:var(--ink);line-height:1.1;letter-spacing:.005em;margin-bottom:.7rem}
header h1 em{font-style:italic;font-weight:400;color:var(--accent)}
.header-sub{font-family:var(--mono);font-size:.68rem;color:var(--ink);opacity:.65;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1.25rem}

/* ── FILTER PANEL ── */
.filter-panel{
  background:var(--paper);
  padding:1rem 2rem;
  position:sticky;top:0;z-index:100;
}
.filter-inner{
  max-width:1200px;margin:0 auto;
  background:#ffffff;
  border-radius:4px;
  padding:1rem 1.25rem;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
.filter-label{
  font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--rule2);margin-bottom:.65rem;
}
.pills{display:flex;flex-wrap:wrap;gap:.45rem;}
.pill{
  display:inline-flex;align-items:center;gap:.45rem;
  padding:.28rem .75rem .28rem .6rem;
  border:1.5px solid var(--rule);
  background:transparent;
  border-radius:2px;
  font-family:var(--serif);font-size:.78rem;color:var(--ink);
  cursor:pointer;transition:all .15s ease;line-height:1.2;
  white-space:nowrap;
}
.pill:hover{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.pill.active{
  background:var(--accent);border-color:var(--accent2);color:#fff;
}
.pill.active .pill-count{background:rgba(255,255,255,.25);color:#fff;}
.pill-label{font-weight:400;}
.pill-count{
  font-family:var(--mono);font-size:.6rem;font-weight:500;
  background:var(--paper3);color:var(--rule2);
  padding:.1rem .35rem;border-radius:2px;
  transition:all .15s ease;
}
.pill:hover .pill-count{background:var(--accent-bg2);color:var(--accent);}

/* ── RESULTS BAR ── */
.results-bar{
  max-width:1200px;margin:0 auto;
  padding:.9rem 2rem .5rem;
  display:flex;align-items:baseline;gap:.75rem;flex-wrap:wrap;
}
.results-type{
  font-family:var(--display);font-size:1.15rem;font-weight:700;color:var(--ink);
}
.results-count{
  font-family:var(--mono);font-size:.65rem;color:var(--rule2);letter-spacing:.08em;
}
.results-desc{
  font-size:.8rem;color:#7a6448;font-style:italic;margin-left:auto;
}

/* ── QUESTION LIST ── */
.q-list{
  max-width:1200px;margin:0 auto;
  padding:.5rem 2rem 4rem;
  display:flex;flex-direction:column;gap:0;
}
.q-card{
  background:var(--paper);
  border:1px solid var(--rule);
  border-left:4px solid var(--accent);
  margin-bottom:.75rem;
  transition:box-shadow .15s,border-color .15s;
  animation:fadeSlide .2s ease both;
}
.q-card:hover{
  box-shadow:0 3px 18px rgba(26,18,8,.1);
  border-color:var(--rule2);
  border-left-color:var(--accent2);
}
@keyframes fadeSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.q-head{
  display:flex;align-items:flex-start;gap:0;
  padding:.7rem 1rem .7rem .85rem;
  border-bottom:1px solid var(--rule);
  background:var(--paper2);
  cursor:pointer;
  user-select:none;
}
.q-num{
  font-family:var(--mono);font-size:.65rem;font-weight:500;
  color:#fff;background:var(--accent);
  padding:.2rem .5rem;border-radius:2px;
  white-space:nowrap;margin-right:.75rem;margin-top:.08rem;flex-shrink:0;
}
.q-stem-preview{
  font-size:.85rem;color:var(--ink);line-height:1.5;flex:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.q-meta{
  display:flex;align-items:center;gap:.5rem;margin-left:.75rem;flex-shrink:0;
}
.badge{
  font-family:var(--mono);font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;
  padding:.15rem .4rem;border-radius:2px;white-space:nowrap;
}
.badge-subj{ background:var(--blue-bg);color:var(--blue);border:1px solid rgba(26,74,139,.2); }
.badge-diff-easy{ background:var(--green-bg);color:var(--green);border:1px solid rgba(26,107,58,.2); }
.badge-diff-medium{ background:var(--gold-bg);color:var(--gold);border:1px solid rgba(138,104,0,.2); }
.badge-diff-hard{ background:var(--accent-bg2);color:var(--accent);border:1px solid rgba(181,64,26,.25); }
.q-toggle{
  font-family:var(--mono);font-size:.7rem;color:var(--rule2);
  margin-left:.5rem;flex-shrink:0;transition:transform .2s;
}
.q-card.open .q-toggle{transform:rotate(180deg);}

/* ── QUESTION BODY ── */
.q-body{
  display:none;padding:1rem 1.2rem 1.2rem;
}
.q-card.open .q-body{display:block;}

.assertion-block{
  font-style:italic;
  background:var(--blue-bg);
  border-left:3px solid var(--blue);
  border:1px solid rgba(26,74,139,.15);
  padding:.6rem .85rem;
  margin-bottom:.65rem;
  font-size:.875rem;
  color:#1a2a4a;
  line-height:1.65;
}
.assertion-label{
  font-family:var(--mono);font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--blue);margin-bottom:.3rem;font-style:normal;
}

.q-stem{font-size:.9rem;color:var(--ink);line-height:1.7;margin-bottom:.65rem;font-weight:600;}

.stmts{list-style:none;display:flex;flex-direction:column;gap:.35rem;margin:.35rem 0 .7rem;}
.stmts li{
  display:flex;gap:.6rem;align-items:flex-start;
  font-size:.855rem;color:var(--ink);line-height:1.6;
  background:rgba(168,144,110,.07);
  border:1px solid var(--rule);
  border-left:3px solid var(--rule2);
  padding:.4rem .7rem;
}
.stmt-label{
  font-family:var(--mono);font-size:.65rem;font-weight:500;
  color:var(--accent2);min-width:1.4rem;flex-shrink:0;margin-top:.1rem;
}

.sub-q{
  font-size:.855rem;font-style:italic;color:#5a4020;
  margin:.6rem 0 .4rem;font-weight:600;
}

.emb-tbl-wrap{overflow-x:auto;margin:.4rem 0 .7rem;}
.emb-tbl{
  width:100%;border-collapse:collapse;font-size:.8rem;
  border:1px solid var(--rule);min-width:360px;
}
.emb-tbl th{
  background:var(--ink);color:var(--paper);
  padding:.35rem .65rem;text-align:left;
  font-family:var(--mono);font-size:.62rem;font-weight:500;letter-spacing:.07em;
  border-right:1px solid rgba(250,246,239,.1);
}
.emb-tbl td{
  padding:.35rem .65rem;border-bottom:1px solid var(--rule);
  border-right:1px solid var(--rule);color:var(--ink);vertical-align:top;
  background:var(--paper);
}
.emb-tbl tr:last-child td{border-bottom:none;}
.emb-tbl tr:nth-child(even) td{background:var(--paper2);}

.code-tbl-wrap{margin:.35rem 0 .55rem;overflow-x:auto;}
.code-tbl{
  border-collapse:collapse;font-family:var(--mono);font-size:.72rem;
  border:1px solid var(--rule);
}
.code-tbl th,.code-tbl td{
  padding:.28rem .6rem;border:1px solid var(--rule);
  text-align:center;
}
.code-tbl th{background:var(--paper3);font-weight:500;color:var(--ink);}
.code-tbl td{background:var(--paper);color:var(--ink);}

.q-tail{
  font-style:italic;font-size:.835rem;
  color:#5a4020;
  margin:.5rem 0 .55rem;
  padding-left:.6rem;
  border-left:2px solid var(--rule2);
}

.options{display:grid;grid-template-columns:1fr 1fr;gap:.32rem .65rem;margin-top:.55rem;}
@media(max-width:640px){.options{grid-template-columns:1fr;}}
.opt{
  display:flex;align-items:flex-start;gap:.5rem;
  font-size:.845rem;padding:.38rem .65rem;
  border:1px solid var(--rule);background:var(--paper);
  color:var(--ink);line-height:1.5;
  transition:border-color .12s,background .12s;
}
.opt:hover{border-color:var(--accent);background:var(--accent-bg);}
.opt-key{
  display:inline-flex;align-items:center;justify-content:center;
  width:1.25rem;height:1.25rem;min-width:1.25rem;
  border-radius:50%;font-family:var(--mono);font-size:.62rem;font-weight:500;
  border:1.5px solid var(--rule2);color:var(--rule2);margin-top:.1rem;flex-shrink:0;
  transition:all .12s;
}
.opt:hover .opt-key{border-color:var(--accent);color:var(--accent);}

/* ── EMPTY STATE ── */
.empty{
  text-align:center;padding:4rem 2rem;color:var(--rule2);
  font-family:var(--display);font-size:1.1rem;font-style:italic;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--paper2);}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--rule2);}
</style>
</head>

","text":"Manushya (humans)"},{"key":"d","text":"Tiryancha (animals and plants)"}],"correct_answer":"b","subject_tag":"History","difficulty":"hard"},{"question_number":16,"question_type":"single_correct","assertion":null,"stem":"The Hallisalasya painting in the Bagh Caves represents:","statements":null,"embedded_table":null,"tail":null,"options":[{"key":"a","text":"A joyous folk dance"},{"key":"b","text":"Buddha in a meditative pose"},{"key":"c","text":"The depiction of Shiva and Parvati on Kailasha"},{"key":"d","text":"Samudramanthan (Churning of the Ocean)"}],"correct_answer":"a","subject_tag":"History","difficulty":"hard"},{"question_number":17,"question_type":"multi_statement_correct","assertion":null,"stem":"Consider the following statements relating to the use of the place-value system in India:","statements":[{"label":"1","text":"The earliest epigraphic use of the place-value system in India is found in the Mankani plates from Gujarat (AD 595 \u2013 596)."},{"label":"2","text":"In the ninth century, place-values become general in inscriptions all over India."},{"label":"3","text":"The place-values have been found in Sanskrit inscriptions in South-east Asia as early as the seventh century."}],"embedded_table":null,"tail":"Which of the statements given above are correct?","options":[{"key":"a","text":"1 and 2 only"},{"key":"b","text":"1 and 3 only"},{"key":"c","text":"2 and 3 only"},{"key":"d","text":"1, 2 and 3"}],"correct_answer":"b","subject_tag":"History","difficulty":"hard"},{"question_number":18,"question_type":"statement_inference","assertion":null,"stem":"Consider the following statements about the archaeological findings in Harappan towns:","statements":[{"label":"I","text":"There is wide occurrence of spindle-whorls in the houses but absence of spinning wheels."},{"label":"II","text":"Weights and measurement scales, complete with graduations have been discovered."},{"label":"III","text":"There are houses built in large part with baked bricks, around relatively spacious courtyards, with their own wells, bathing platforms, and large rooms."}],"sub_question":"Which of the following inferences can be drawn from the above statements?","sub_statements":[{"label":"1","text":"Statement I suggests that spinning was a laborious activity done at home."},{"label":"2","text":"Statement II suggests the extent of the scientific knowledge that the Harappans possessed."},{"label":"3","text":"Statement III suggests the emergence of a common property system."}],"embedded_table":null,"tail":"Select the answer using the code given below:","options":[{"key":"a","text":"1 and 2 only"},{"key":"b","text":"2 and 3 only"},{"key":"c","text":"1 and 3 only"},{"key":"d","text":"1, 2 and 3"}],"correct_answer":"a","subject_tag":"History","difficulty":"medium"},{"question_number":19,"question_type":"single_correct","assertion":null,"stem":"Which one of the following statements about the Eka Movement and Bardoli Satyagraha is correct?","statements":null,"embedded_table":null,"tail":null,"options":[{"key":"a","text":"The Eka Movement was throughout supported and organized by the Congress while Bardoli Satyagraha was initially independent of Congress influence and was only in the last stages supported by the Congress."},{"key":"b","text":"The Eka Movement was provided leadership by the taluqdars of Awadh, whereas the Bardoli Satyagraha was a movement of the landless labourers."},{"key":"c","text":"The Bardoli Satyagraha was a campaign against the enhancement of land revenue, while the Eka Movement was a protest against excessive extraction of rents."},{"key":"d","text":"The Eka Movement was located in the Varanasi and Mirzapur districts of the present-day U.P., while the Bardoli Satyagraha took place in Saurashtra."}],"correct_answer":"c","subject_tag":"History","difficulty":"hard"},{"question_number":20,"question_type":"statement_support","assertion":null,"stem":"Consider the following statements about the Rigvedic period:","statements":[{"label": na is/are correct?","statements":[{"label":"1","text":"It is the largest desert lake in the world."},{"label":"2","text":"The lake is situated in South Sudan along the eastern fringe of the Sahara desert."},{"label":"3","text":"The lake is listed as a UNESCO World Heritage Site and is also referred to as the 'Jade Sea'."}],"embedded_table":null,"tail":"Select the answer using the code given below:","options":[{"key":"a","text":"1 only"},{"key":"b","text":"1 and 3 only"},{"key":"c","text":"2 and 3 only"},{"key":"d","text":"1, 2 and 3"}],"correct_answer":"b","subject_tag":"Geography","difficulty":"medium"},{"question_number":30,"question_type":"single_correct","assertion":null,"stem":"Which one of the following is the first Plan Vivo certified Reducing Emissions from Deforestation and Forest Degradation (REDD+) project in India?","statements":null,"embedded_table":null,"tail":null,"options":[{"key":"a","text":"Uttarakhand REDD+ project"},{"key":"b","text":"ICFRE-ICIMOD Transboundary REDD+ project in North-Eastern Himalayas"},{"key":"c","text":"Khasi Hills Community REDD+ project"},{"key":"d","text":"Sikkim Mamley Kamrang Community REDD+ project"}],"correct_answer":"c","subject_tag":"Environment","difficulty":"hard"},{"question_number":31,"question_type":"statement_relationship","assertion":null,"stem":"Consider the following statements with reference to India's response to climate change:","statements":[{"label":"I","text":"India's Long-Term Low Emission Development Strategy (LT-LEDS) is a crucial tool for achieving net-zero emissions by 2070."},{"label":"II","text":"India's 4th Biennial Update Report (BUR-4) submitted in December, 2024 recorded around 8% decrease in Greenhouse gas emissions in 2020 over 2019."},{"label":"III","text":"Climate-resilient development necessarily depends on quick and short-term achievement of emission reduction targets."}],"sub_question":"Which of the following relationships among the above statements is/are correct?","sub_statements":[{" ing up of four Thematic Hubs (T-Hubs) in academic and national R&D institutes across India."}],"embedded_table":null,"tail":"Select the answer using the code given below:","options":[{"key":"a","text":"1 only"},{"key":"b","text":"2 only"},{"key":"c","text":"Both 1 and 2"},{"key":"d","text":"Neither 1 nor 2"}],"correct_answer":"b","subject_tag":"Science","difficulty":"medium"},{"question_number":75,"question_type":"multi_statement_correct","assertion":null,"stem":"Which of the following statements with regard to India's Deep Ocean Mission is/are correct?","statements":[{"label":"1","text":"It was launched by the Ministry of Ports, Shipping and Waterways, Government of India."},{"label":"2","text":"Matsya-6000 has been designed to carry 3 people for deep sea exploration."},{"label":"3","text":"Samudrayaan is a project under this mission."}],"embedded_table":null,"tail":"Select the answer using the code given below:","options":[{"key":"a","text":"1 only"},{"key":"b","text":"2 and 3 only"},{"key":"c","text":"1 and 2 only"},{"key":"d","text":"1, 2 and 3"}],"correct_answer":"b","subject_tag":"Science","difficulty":"medium"},{"question_number":76,"question_type":"case_study_ethics","assertion":null,"stem":"Mr. X, a senior officer, was overseeing a critical vaccination programme during a pandemic. He found that a private service provider responsible for vaccine distribution was compromising on quality to make profits. Despite immense pressure to manage the issue due to vested interests, he raised his voice based on the principles of public administration which he learnt during various training programmes attended across his career. He reported the issue to the appropriate vigilance authority and halted the contract to ensure citizen welfare. Which one among the following principles of public administration was most strongly demonstrated by Mr. X's actions?","statements":null,"embedded_table":null,"tail":null,"options":[{"key":"a","text":"Esprit de corps"},{"key":"b","text":"Equity"},{"key":"c","text":"Accountability"},{"key":"d","text":"Delegation"}],"correct_answer":"c","subject_tag":"Ethics","difficulty":"easy"},{"question_number":77,"question_type":"case_study_ethics","assertion":null,"stem":"In a multi-ethnic district where both economic competition and historical grievances frequently led to community tensions, a flashpoint has arisen with a Government decision to allocate land for a waste management facility near a tribal hamlet, sparking protests by the tribal community, which claimed that the land was sacred and critical to their cultural identity. At the same time, urban residents and local industries supported the project, citing severe solid waste challenges and health concerns due to lack of a proper disposal site. The conflict has escalated with road blockades, social media campaigns, and allegations of police excesses. As a responsible Government official, you are tasked with resolving the situation through mediation, ensuring a sustainable outcome that balances environmental needs, tribal rights, and urban public health. Consider the following statements with reference to the above:","statements":[{"label":"1","text":"A successful conflict resolution process must begin with acknowledging the cultural concerns of the protesting tribal community before discussing technical alternatives."},{"label":"2","text":"The Government should move ahead with the project without delay to address urban health concerns, which outweigh the sentiments of a small group."},{"label":"3","text":"Creating a multi-stakeholder dialogue platform \u2014 including tribal leaders, environmental experts, and municipal representatives \u2014 to build mutual understanding and help de-escalate tensions."},{"label":"4","text":"Conducting an independent Environmental and Social Impact Assessment (ESIA) and sharing findings transparently with both sides to facilitate evidence-based decision-making."}],"embedded_table":null,"tail":"Which of the statements given above would contribute to the resolution process?","options":[{"key":"a","text":"1, 3 and 4 only"},{"key":"b","text":"2, 3 and 4 only"},{"key":"c","text":"1 and 2 only"},{"key":"d","text":"1, 2, 3 and 4"}],"correct_answer":"a","subject_tag":"Ethics","difficulty":"medium"},{"question_number":78,"question_type":"case_study_ethics","assertion":null,"stem":"Ms. X is a mid-level civil service official working in the urban development department of a major city. Recently, she was involved in approving a contract for a public infrastructure project \u2014 a new community park. During the approval process, she received a piece of confidential information indicating that one of the shortlisted contractors had a history of poor workmanship and allegations of corruption in other cities, though nothing had been legally proven. The Head of the Department, Mr. Y, advised her not to disclose this information to the project committee or the public because it could delay the project and damage the city's reputation. However, Ms. X believed that withholding such information compromised transparency and public trust. What amongst the following should Ms. X do now?","statements":[{"label":"1","text":"Immediately disclose the information to the project committee and the public"},{"label":"2","text":"Recommend removing the contractor from the shortlist to protect the project's integrity"},{"label":"3","text":"Propose a 'limited disclosure' to an oversight committee, while keeping the information confidential from the public for the time being"}],"embedded_table":null,"tail":"Select the answer using the code given below:","options":[{"key":"a","text":"1 and 2 only"},{"key":"b","text":"3 only"},{"key":"c","text":"2 and 3 only"},{"key":"d","text":"1, 2 and 3"}],"correct_answer":"b","subject_tag":"Ethics","difficulty":"medium"},{"question_number":79,"question_type":"legal_reasoning","assertion":null,"stem":"'X' was addressing a seminar on the meaning of the term 'law' as provided under Article 13, Part III of the Constitution of India. 'X' explained that the meaning of the term 'law' in the Constitution of India was very comprehensive. It included ordinances, orders and even rules and regulations. 'Y' pointed out that the term 'law' in Article 13 also included custom or usage having in the territory of India the force of law, to which 'X' was not convinced. Based on the above, select the correct conclusion from the options given below:","statements":null,"embedded_table":null,"tail":null,"options":[{"key":"a","text":"'X' is correct in the interpretation of law, including the view on non-inclusion of custom."},{"key":"b","text":"The view of 'Y' that 'law' included custom is not correct."},{"key":"c","text":"The views of both 'X' and 'Y' are correct."},{"key":"d","text":"The view of only 'Y' is correct."}],"correct_answer":"a","subject_tag":"Polity","difficulty":"hard"},{"question_number":80,"question_type":"conclusion_based","assertion":null,"stem":"Consider the following statements with reference to the Constitution of India:","statements":[{"label":"1","text":"There is no Article in the Constitution of India that specifies that the Constitution of India will be officially called the 'Constitution of India'."},{"label":"2","text":"There is no Article in the Constitution of India that specifies that the Indian Independence Act, 1947 and the Government of India Act, 1935 stand repealed."},{"label":"3","text":"There is no Article in the Constitution of India that mentions 26th January, 1950 as the date of the commencement of the Constitution of India."}],"embedded_table":null,"tail":"Which one of the following conclusions based on the above statements is correct?","options":[{"key":"a","text":"All three statements are correct."},{"key":"b","text":"There is no correct statement."},{"key":"c","text":"There are two correct statements that include statement 3."},{"key":"d","text":"There is only one correct statement."}],"correct_answer":"a","subject_tag":"Polity","difficulty":"hard"},{"question_number":81,"question_type":"multi_statement_correct","assertion":null,"stem":"Which of the following statements with regard to the persons with disabilities in India is/are correct?","statements":[{"label":"1","text":"The Rights of Persons with Disabilities Act, an Act passed by the Parliament of India in 2018, mandates reservation in education and employment, places a legal duty on Governments to ensure accessibility and non-discrimination."},{"label":"2","text":"The Sugamya Bharat Abhiyan focuses on achieving universal accessibility for Persons with Disabilities across three key domains \u2014 built infrastructure, transport systems and information and communication technology."},{"label":"3","text":"The National Divyangjan Finance and Development Corporation (NDFDC) is a public sector organisation set up by the Ministry of Corporate Affairs as a not-for-profit company to promote entrepreneurship among Persons with Disabilities (PwDs)."}],"embedded_table":null,"tail":"Select the answer using the code given below:","options":[{"key":"a","text":"1 and 2"},{"key":"b","text":"2 only"},{"key":"c","text":"1 and 3"},{"key":"d","text":"1 only"}],"correct_answer":"a","subject_tag":"Polity","difficulty":"medium"},{"question_number":82,"question_type":"conclusion_based","assertion":null,"stem":"Consider the following statements about the provisions pertaining to the Scheduled Castes and the Scheduled Tribes in India:","statements":[{"label":"1","text":"Provisions regarding the administration of the Tribal Areas in the States of Assam, Meghalaya, Tripura and Mizoram are given in the Fifth Schedule of the Constitution of India."},{"label":"2","text":"Some tribes of India are entitled to exemption from paying Income Tax on certain incomes."},{"label":"3","text":"The Constitution of India provides for reservation of seats in Panchayats for women belonging to the Scheduled Castes and the Scheduled Tribes."}],"embedded_table":null,"tail":" ith Kakarvitta in Nepal."}],"embedded_table":null,"tail":"Which of the statements given above is/are correct?","options":[{"key":"a","text":"1 and 2"},{"key":"b","text":"2 and 3"},{"key":"c","text":"1 only"},{"key":"d","text":"3 only"}],"correct_answer":"d","subject_tag":"Geography","difficulty":"hard"},{"question_number":87,"question_type":"multi_statement_correct","assertion":null,"stem":"Which of the following statements about a Zero First Information Report (Zero FIR) under the Bharatiya Nagarik Suraksha Sanhita (BNSS), 2023 is/are correct?","statements":[{"label":"1","text":"A Zero FIR can be lodged at a police station, even though the place of commission of a cognizable/non-cognizable offence is outside the territorial jurisdiction of that police station."},{"label":"2","text":"The Officer-in-Charge of the police station where a Zero FIR has been lodged may, with the permission of the competent authority, initiate a preliminary enquiry."},{"label":"3","text":"Under Zero FIR, it is obligatory for the informant to furnish information electronically."}],"embedded_table":null,"tail":"Select the answer using the code given below:","options":[{"key":"a","text":"1, 2 and 3"},{"key":"b","text":"2 and 3 only"},{"key":"c","text":"1 only"},{"key":"d","text":"2 only"}],"correct_answer":"c","subject_tag":"Polity","difficulty":"medium"},{"question_number":88,"question_type":"match_table_correct","assertion":null,"stem":"With reference to the organisations under the Government of India, consider the following details:","statements":null,"embedded_table":{"headers":["Sl. No.","Organisation","Function","Controlling Union Ministry"],"rows":[["1.","Central Economic Intelligence Bureau (CEIB)","To coordinate between various law enforcement agencies","Ministry of Home Affairs"],["2.","Serious Fraud Investigation Office (SFIO)","To investigate complex corporate frauds","Ministry of Finance (MCA)"],["3.","Central Bureau of Investigation (CBI)","To preserve values in public life and }

function renderStatements(stmts){
  if(!stmts||!stmts.length) return '';
  return '<ul class="stmts">' +
    stmts.map(s=>`<li><span class="stmt-label">${esc(s.label)}.</span><span>${esc(s.text)}</span></li>`).join('') +
    '</ul>';
}

function renderTable(tbl){
  if(!tbl) return '';
  const heads = tbl.headers.map(h=>`<th>${esc(h)}</th>`).join('');
  const rows = tbl.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
  return `<div class="emb-tbl-wrap"><table class="emb-tbl"><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderCodeTable(ct){
  if(!ct) return '';
  const heads = ct.headers.map(h=>`<th>${esc(h)}</th>`).join('');
  const rows = ct.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
  return `<div class="code-tbl-wrap"><table class="code-tbl"><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderQuestion(q){
  let body = '';

  // assertion block
  if(q.assertion){
    body += `<div class="assertion-block"><div class="assertion-label">Assertion / Passage</div>${esc(q.assertion)}</div>`;
  }

  // main stem
  body += `<div class="q-stem">${esc(q.stem)}</div>`;

  // primary statements
  if(q.statements) body += renderStatements(q.statements);

  // sub_question + sub_statements (for inference/support/relationship types)
  if(q.sub_question){
    body += `<div class="sub-q">${esc(q.sub_question)}</div>`;
    if(q.sub_statements) body += renderStatements(q.sub_statements);
  }

  // embedded table
  if(q.embedded_table){
    body += renderTable(q.embedded_table);
    if(q.embedded_table.code_table){
      body += renderCodeTable(q.embedded_table.code_table);
    }
  }

  // tail
  if(q.tail) body += `<div class="q-tail">${esc(q.tail)}</div>`;

  // options
  body += '<div class="options">' +
    q.options.map(o=>
      `<div class="opt"><span class="opt-key">${esc(o.key)}</span><span class="opt-text">${esc(o.text)}</span></div>`
    ).join('') +
    '</div>';

  return body;
}

function renderList(type){
  const filtered = DATA.filter(q=>q.question_type===type);
  const list = document.getElementById('q-list');
  const label = document.getElementById('results-type-label');
  const countEl = document.getElementById('results-count-label');

  label.textContent = TYPE_LABELS[type]||type;
  countEl.textContent = filtered.length + ' question' + (filtered.length!==1?'s':'');

  if(!filtered.length){
    list.innerHTML = '<div class="empty">No questions found for this type.</div>';
    return;
  }

  list.innerHTML = filtered.map((q,i)=>{
    const diffCls = DIFF_CLASS[q.difficulty]||'badge-diff-medium';
    const preview = q.stem.length > 120 ? q.stem.slice(0,117)+'…' : q.stem;
    return `<div class="q-card open" id="qcard-${q.question_number}" style="animation-delay:${i*0.025}s">
  <div class="q-head" onclick="toggleCard(${q.question_number})">
    <span class="q-num">Q${q.question_number}</span>
    <span class="q-stem-preview">${esc(preview)}</span>
    <span class="q-meta">
      <span class="badge badge-subj">${esc(q.subject_tag)}</span>
      <span class="badge ${diffCls}">${esc(q.difficulty)}</span>
    </span>
    <span class="q-toggle">▾</span>
  </div>
  <div class="q-body">${renderQuestion(q)}</div>
</div>`;
  }).join('');
}

function toggleCard(num){
  const card = document.getElementById('qcard-'+num);
  card.classList.toggle('open');
}

// pill click
document.getElementById('pills').addEventListener('click',function(e){
  const btn = e.target.closest('.pill');
  if(!btn) return;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  renderList(btn.dataset.type);
  document.getElementById('q-list').scrollIntoView({behavior:'smooth',block:'start'});
});

// init: render first pill
const firstPill = document.querySelector('.pill');
if(firstPill) renderList(firstPill.dataset.type);
</script>
</body>
