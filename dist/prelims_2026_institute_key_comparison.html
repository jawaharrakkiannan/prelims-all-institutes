<script>
var ROWS_MAP   = {"1":{"setAQ":1,"codeQNums":{"A":1,"B":21,"C":31,"D":11},"qHtml":"<div class=\"q-lead\">Which one of the following Carnatic music <em>ragas</em> is similar to <em>Raga</em> Bilawal in Hindustani music ?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">Nat Bhairavi</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">Kamavardhini</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Hanumatodi</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Dheera Shankarabharanam</span></div></div>","subject":"Art & Culture","answers":{"Forum IAS":"D","ONLY IAS (PW)":"D","Shankar IAS":"D","Study IQ IAS":"D","Vision IAS":"D"},"status":"agree"},"2":{"setAQ":2,"codeQNums":{"A":2,"B":22,"C":32,"D":12},"qHtml":"<div class=\"q-lead\">The artificially fixed rupee-sterling exchange rate prescribed by the Hilton-Young Commission (1926) was adopted by the British Government for which one of the following reasons ?</div><div class=\"options single-col\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">Aiding the flow of remittances from India and maintaining India's creditworthiness</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">Providing support to Indian importers</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Encouraging export of cotton produce from India</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Preventing depreciation of the Rupee in terms of gold</span></div></div>","subject":"Modern India (1757–1857)","answers":{"Forum IAS":"A","ONLY IAS (PW)":"A","Shankar IAS":"B/D","Study IQ IAS":"A","Vision IAS":"A"},"status":"disagree"},"3":{"setAQ":3,"codeQNums":{"A":3,"B":23,"C":33,"D":13},"qHtml":"<div class=\"q-lead\">Consider the following statements :</div><ul class=\"statements\"><li>I. Pali texts contain the first definite references to coins, e.g., <em>kahapana</em>, <em>nikkha</em>, <em>kamsa</em>, and <em>kakanika</em>.</li><li>II. The literary evidence from Pali texts is corroborated by archaeological evidence of punch-marked coins from many sites, most of them made of silver.</li></ul><div class=\"q-lead\">The above statements have been associated with which of the following ?</div><ul class=\"statements\"><li>1. Emergence of urban life</li><li>2. Transition to money economy</li></ul><div class=\"q-tail\">Select the answer using the code given below :</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both 1 and 2</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither 1 nor 2</span></div></div>","subject":"Ancient History","answers":{"Forum IAS":"C","ONLY IAS (PW)":"C","Shankar IAS":"C","Study IQ IAS":"C","Vision IAS":"C"},"status":"agree"},"4":{"setAQ":4,"codeQNums":{"A":4,"B":24,"C":34,"D":14},"qHtml":"<div class=\"q-lead\">Which of the following temples has/have a <em>Nagara</em>-style <em>shikhara</em> ?</div><ul class=\"statements\"><li>1. Malegitti Shivalaya, Badami</li><li>2. Huchimalligudi Temple, Aihole</li><li>3. Dashavatara Temple, Deogarh</li><li>4. Virupaksha Temple, Pattadakal</li></ul><div class=\"q-tail\">Select the answer using the code given below :</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 and 3</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">3 only</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">3 and 4</span></div></div>","subject":"Art & Culture","answers":{"Forum IAS":"B","ONLY IAS (PW)":"B","Shankar IAS":"B","Study IQ IAS":"B","Vision IAS":"B"},"status":"agree"},"5":{"setAQ":5,"codeQNums":{"A":5,"B":25,"C":35,"D":15},"qHtml":"<div class=\"q-lead\">Among the four main forms of existence of life recognized in Jainism, which one of the following is <em>not</em> included ?</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\"><em>Deva</em> (gods)</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\"><em>Yaksha</em> (demi-gods)</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\"><em>Manushya</em> (humans)</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\"><em>Tiryancha</em> (animals and plants)</span></div></div>","subject":"Ancient History","answers":{"Forum IAS":"B","ONLY IAS (PW)":"B","Shankar IAS":"A","Study IQ IAS":"B","Vision IAS":"B"},"status":"disagree"},"6":{"setAQ":6,"codeQNums":{"A":6,"B":26,"C":36,"D":16},"qHtml":"<div class=\"q-lead\">The <em>Hallisalasya</em> painting in the Bagh Caves represents :</div><div class=\"options single-col\"><div class=\"option opt-agree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">A joyous folk dance</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">Buddha in a meditative pose</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">The depiction of Shiva and Parvati on Kailasha</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Samudramanthan (Churning of the Ocean)</span></div></div>","subject":"Art & Culture","answers":{"Forum IAS":"A","ONLY IAS (PW)":"A","Shankar IAS":"A","Study IQ IAS":"A","Vision IAS":"A"},"status":"agree"},"7":{"setAQ":7,"codeQNums":{"A":7,"B":27,"C":37,"D":17},"qHtml":"<div class=\"q-lead\">Consider the following statements relating to the use of the place-value system in India :</div><ul class=\"statements\"><li>1. The earliest epigraphic use of the place-value system in India is found in the Mankani plates from Gujarat (AD 595 – 596).</li><li>2. In the ninth century, place-values become general in inscriptions all over India.</li><li>3. The place-values have been found in Sanskrit inscriptions in South-east Asia as early as the seventh century.</li></ul><div class=\"q-tail\">Which of the statements given above are correct ?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">1 and 3 only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">2 and 3 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1, 2 and 3</span></div></div>","subject":"Ancient History","answers":{"Forum IAS":"D","ONLY IAS (PW)":"B","Shankar IAS":"D","Study IQ IAS":"D","Vision IAS":"D"},"status":"disagree"},"8":{"setAQ":8,"codeQNums":{"A":8,"B":28,"C":38,"D":18},"qHtml":"<div class=\"q-lead\">Consider the following statements about the archaeological findings in Harappan towns :</div><ul class=\"statements\"><li>I. There is wide occurrence of spindle-whorls in the houses but absence of spinning wheels.</li><li>II. Weights and measurement scales, complete with graduations have been discovered.</li><li>III. There are houses built in large part with baked bricks, around relatively spacious courtyards, with their own wells, bathing platforms, and large rooms.</li></ul><div class=\"q-lead\">Which of the following inferences can be drawn from the above statements ?</div><ul class=\"statements\"><li>1. Statement I suggests that spinning was a laborious activity done at home.</li><li>2. Statement II suggests the extent of the scientific knowledge that the Harappans possessed.</li><li>3. Statement III suggests the emergence of a common property system.</li></ul><div class=\"q-tail\">Select the answer using the code given below :</div><div class=\"options\"><div class=\"option opt-agree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 and 3 only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">1 and 3 only</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1, 2 and 3</span></div></div>","subject":"Ancient History","answers":{"Forum IAS":"A","ONLY IAS (PW)":"A","Shankar IAS":"A","Study IQ IAS":"A","Vision IAS":"A"},"status":"agree"},"9":{"setAQ":9,"codeQNums":{"A":9,"B":29,"C":39,"D":19},"qHtml":"<div class=\"q-lead\">Which one of the following statements about the Eka Movement and Bardoli Satyagraha is correct ?</div><div class=\"options single-col\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">The Eka Movement was throughout supported and organized by the Congress while Bardoli Satyagraha was initially independent of Congress influence and was only in the last stages supported by the Congress.</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">The Eka Movement was provided leadership by the <em>taluqdars</em> of Awadh, whereas the Bardoli Satyagraha was a movement of the landless labourers.</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">The Bardoli Satyagraha was a campaign against the enhancement of land revenue, while the Eka Movement was a protest against excessive extraction of rents.</span></div><div class=\"option\"> var KEYS       = [{"name":"Forum IAS","isOfficial":false},{"name":"ONLY IAS (PW)","isOfficial":false},{"name":"Shankar IAS","isOfficial":false},{"name":"Study IQ IAS","isOfficial":false},{"name":"Vision IAS","isOfficial":false}];

var currentCode   = 'A';
var currentFilter = 'all';

function ansClass(v) {
  if (!v) return 'ans-null';
  if (v.length > 1) return 'ans-ambig';
  return 'ans-' + v.toLowerCase();
}

function renderTable() {
  var order = CODE_ORDER[currentCode];
  var agree = 0, disagree = 0, shown = 0;
  var html = '';
  for (var idx = 0; idx < order.length; idx++) {
    var setAQ = order[idx];
    var row = ROWS_MAP[setAQ];
    if (!row) continue;
    var qNum = row.codeQNums[currentCode];
    var qDisp = qNum !== null && qNum !== undefined ? qNum : '—';
    if (row.status === 'agree') agree++;
    else if (row.status === 'disagree') disagree++;
    var hidden = (currentFilter === 'agree' && row.status !== 'agree') ||
                 (currentFilter === 'disagree' && row.status !== 'disagree');
    if (!hidden) shown++;
    var cls = row.status === 'agree' ? 'row-agree' : row.status === 'disagree' ? 'row-disagree' : '';
    if (hidden) cls += (cls ? ' ' : '') + 'row-hidden';

    var ansCells = '';
    for (var ki = 0; ki < KEYS.length; ki++) {
      var k = KEYS[ki];
      var v = row.answers[k.name];
      ansCells += '<td class="td-ans' + (k.isOfficial ? ' td-official' : '') + ' ' + ansClass(v) + '">' + (v || '—') + '</td>';
    }

    html += '<tr class="' + cls + '">' +
      '<td class="td-qnum">Q' + qDisp + '</td>' +
      '<td class="td-q">' + (row.qHtml || '') + '</td>' +
      ansCells +
      '</tr>';
  }
  document.getElementById('tbl-body').innerHTML = html;
  document.getElementById('stats-bar').innerHTML =
    '<span>' + shown + ' shown</span>' +
    '<span class="s-agree">&#10003; ' + agree + ' agree</span>' +
    '<span class="s-dis">&#10007; ' + disagree + ' discrepancies</span>';
}

document.querySelectorAll('[data-code]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-code]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentCode = btn.dataset.code;
    renderTable();
  });
});

document.querySelectorAll('[data-filter]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-filter]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable();
  });
});

renderTable();
</script>
