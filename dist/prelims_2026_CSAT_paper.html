<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button,select,input,textarea{font-family:inherit;font-size:inherit}
html{scroll-behavior:smooth;overflow-x:hidden}
:root{
  --bg:#fff7ed;--bg2:#ffedd5;--surface:#ffffff;--surface2:#fff7ed;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#111827;--text2:#374151;--text3:#6b7280;
  --accent:#ea580c;--accent2:rgba(234,88,12,.11);--accent3:rgba(234,88,12,.05);
  --radius:2px;
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
body{
  font-family:var(--font-body);
  background-color:var(--bg);
  background-image:repeating-linear-gradient(
    transparent 0,transparent 1.65rem,
    rgba(180,120,60,.06) 1.65rem,rgba(180,120,60,.06) calc(1.65rem + 1px)
  );
  color:var(--text);padding:0;line-height:1.65;min-height:100vh;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.038;
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/></filter><rect width='256' height='256' filter='url(%23n)'/></svg>");
}
.page-shell{max-width:1100px;margin:0 auto;padding:0 1.5rem 4rem}
header{text-align:center;padding:0 1rem;margin-bottom:1.5rem}
.masthead-rule{border:none;border-top:3px solid var(--text);border-bottom:1px solid var(--text);height:5px;margin:2rem 0 1.25rem;background:transparent}
.masthead-rule.bottom{margin:1.25rem 0 0}
header h1{font-family:var(--font-body);font-size:clamp(2rem,5vw,3.2rem);font-weight:700;color:var(--text);line-height:1.1;letter-spacing:.005em;margin-bottom:.7rem}
header h1 em{font-style:italic;font-weight:400;color:var(--accent)}
.header-sub{font-family:var(--font-mono);font-size:.68rem;color:var(--text2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:1.25rem}
.ctrl-bar{max-width:1100px;margin:0 auto 1rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;padding:.6rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.count-tag{font-family:var(--font-mono);font-size:.6rem;color:var(--text3);letter-spacing:.08em;margin-left:auto}
.count-num{color:var(--accent);font-weight:600}
.search-wrap{display:flex;align-items:center;gap:.5rem}
.search-wrap input{padding:.3rem .7rem;border:1px solid var(--border2);border-radius:var(--radius);font-size:.82rem;background:var(--bg);color:var(--text);width:200px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}
.filter-card{max-width:1100px;margin:0 auto 1.5rem;background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:var(--radius);padding:.85rem 1.25rem}
.filter-hdr{display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem}
.filter-hdr h2{font-family:var(--font-mono);font-size:.62rem;font-weight:500;color:var(--text2);letter-spacing:.18em;text-transform:uppercase;flex:1}
.btn-all{font-family:var(--font-mono);font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border:1.5px solid var(--accent);border-radius:var(--radius);background:var(--accent);color:#fff;cursor:pointer;transition:all .12s}
.btn-all:hover{background:#c2410c;border-color:#c2410c}
.btn-all.inactive{background:transparent;color:var(--accent)}
.btn-all.inactive:hover{background:var(--accent3)}
.filter-btns{display:flex;flex-wrap:wrap;gap:.35rem}
.fbtn{font-family:var(--font-body);font-size:.78rem;font-weight:400;padding:.28rem .7rem;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;line-height:1.3}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{border-color:var(--accent);background:var(--accent);color:#fff;font-weight:500}
.subject-section{margin-bottom:2.2rem}
.subject-heading{font-size:1rem;font-weight:700;color:var(--text);padding:.5rem 0 .5rem .9rem;border-left:3px solid var(--accent);margin-bottom:.75rem;display:flex;align-items:baseline;gap:.6rem}
.subject-heading small{font-family:var(--font-mono);font-size:.58rem;font-weight:400;color:var(--text3);letter-spacing:.1em}
.subj-tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);margin-bottom:.25rem}
.subj-tbl thead th{background:var(--accent);color:#fff;padding:.45rem .85rem;text-align:left;font-family:var(--font-mono);font-size:.6rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border-bottom:2px solid rgba(0,0,0,.1);border-right:1px solid rgba(255,255,255,.2)}
.subj-tbl thead th:last-child{border-right:none}
.subj-tbl tbody tr{border-bottom:1px solid var(--border)}
.subj-tbl tbody tr:last-child{border-bottom:none}
.subj-tbl tbody tr:hover td.col-num{border-left:3px solid var(--accent)}
.subj-tbl td{padding:.55rem .85rem;vertical-align:top;color:var(--text2);font-size:.86rem;border-right:1px solid var(--border);overflow-wrap:break-word;word-break:break-word}
.subj-tbl td:last-child{border-right:none}
.col-num{width:1px;white-space:nowrap;font-family:var(--font-mono);font-size:.62rem;font-weight:600;color:var(--accent);border-left:3px solid transparent;transition:border-left-color .15s}
.col-topic{width:110px;min-width:110px;max-width:110px;font-size:.78rem;color:var(--text2);line-height:1.45;word-break:break-word}
.col-question{font-size:.86rem;color:var(--text);line-height:1.65}
.code-selector{display:flex;align-items:center;gap:.4rem}
.code-label{font-family:var(--font-mono);font-size:.6rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase}
.cbtn{font-family:var(--font-mono);font-size:.68rem;font-weight:600;padding:.25rem .7rem;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text3);cursor:pointer;transition:all .12s}
.cbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cbtn:disabled{opacity:.35;cursor:not-allowed}
.empty{font-family:var(--font-mono);font-size:.72rem;color:var(--text3);padding:1.5rem 0;text-align:center;letter-spacing:.1em}
.q-passage-block{background:#fef9ec;border:1px solid #d4b574;border-left:3px solid #b8960c;border-radius:var(--radius);padding:.65rem .9rem;margin-bottom:.65rem}
.passage-dir{font-family:var(--font-mono);font-size:.58rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#92700a;margin-bottom:.35rem}
.passage-body{font-size:.86rem;color:#3b2f0c;line-height:1.75}
.q-lead{font-size:.9rem;color:var(--text);line-height:1.65;margin-bottom:.5rem;white-space:pre-wrap}
.statements{list-style:none;margin:.3rem 0 .65rem;display:flex;flex-direction:column;gap:.4rem}
.statements li{font-size:.87rem;color:var(--text2);line-height:1.55;background:rgba(234,88,12,.06);border:1px solid rgba(234,88,12,.18);border-left:3px solid var(--accent);border-radius:var(--radius);padding:.4rem .75rem;box-shadow:0 1px 3px rgba(234,88,12,.07)}
.q-tail{font-size:.865rem;font-style:italic;color:#14532d;background:#f0fdf4;border-radius:var(--radius);padding:.3rem .6rem;margin:.4rem 0 .5rem;border-left:3px solid #22c55e}
.options{display:grid;grid-template-columns:1fr 1fr;gap:.3rem .65rem;margin-top:.65rem}
.options.single-col{grid-template-columns:1fr}
.option{display:flex;align-items:flex-start;gap:.45rem;font-size:.86rem;padding:.38rem .6rem;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text2);transition:border-color .12s,background .12s,color .12s;cursor:pointer}
.option:hover{border-color:var(--accent);background:var(--accent3);color:var(--text)}
.option.selected{border-color:var(--accent);background:var(--accent2);color:var(--text)}
.option.selected .opt-key{border-color:var(--accent);color:var(--accent)}
.opt-key{display:inline-flex;align-items:center;justify-content:center;width:1.2rem;height:1.2rem;min-width:1.2rem;border-radius:50%;font-family:var(--font-mono);font-size:.63rem;font-weight:500;margin-top:.1rem;flex-shrink:0;border:1.5px solid var(--border2);color:var(--text3);background:transparent;transition:border-color .12s,color .12s}
.option:hover .opt-key{border-color:var(--accent);color:var(--accent)}
.opt-text{line-height:1.45;color:inherit}
@media(max-width:700px){
  .page-shell{padding:0 .75rem 3rem}
  .options{grid-template-columns:1fr}
  .search-wrap input{width:130px}
}
</style>

<script>
const passages = {
  "Passage-1": {
    direction: "Directions for the next 3 (three) items",
    text: `When SARS-CoV-2 was first detected in 2019, it was a truly novel virus for the world. At that time, no one in the world had been exposed to SARS-CoV-2 or had specific immunity against it. In contrast, people across the world have been exposed to HMPV for decades and the virus is well-studied. HMPV and SARS-CoV-2 belong to two very different virus families with fundamentally different characteristics and epidemiology, with strong seasonality seen in HMPV, unlike SARS-CoV-2. Both viruses cause different severity of symptoms, particularly over the long term, and the affected population segments do not fully overlap. In general, HMPV causes milder illness with deaths being very rare and with no long-term post-viral symptoms.`,
    questions: [6, 7, 8]
  },
  "Passage-2": {
    direction: "Directions for the next 2 (two) items",
    text: `India is starting to deploy AI for critical use cases such as weather forecasting, pest detection and control, and crop yield optimisation. However, penetration is limited to a small subset of tech-savvy farmers. In the US and in Europe, generative AI tools have started offering precision farming at scale, integrating large datasets to provide real-time agronomic insights. For at-scale integration and accessibility of AI tools in India, it would be helpful to develop Indian languages-based AI tools for smallholder farmers, partner with AgTechs to create affordable AI solutions, and disseminate AI-based advisory services through government programmes.`,
    questions: [11, 12]
  },
  "Passage-3": {
    direction: "Directions for the next 2 (two) items",
    text: `The Juvenile Justice (Care and Protection of Children) Act, or the JJ Act, 2015 allows for the possibility for trying adolescents above 16 as adults if they are accused of committing a heinous offence. A heinous offence is one with a minimum punishment of seven years. Offences such as culpable homicide and causing death by negligence, which are common in drunken driving cases, are not heinous offences because they do not have a prescribed minimum punishment. The JJ Act, amended in 2021, now categorises an offence that has no minimum sentence, but has a maximum sentence of seven years or more as a serious offence which nonetheless, in the opinion of activists, does not merit the transfer of a case to the adult criminal justice system.`,
    questions: [19, 20]
  },
  "Passage-4": {
    direction: "Directions for the next 2 (two) items",
    text: `The key source of the battle for clean skies and clear lungs is the fuel we burn—from household Chulhas to the thermal power plants. In most cases, it is biomass or coal. The Supreme Court banned the use of pet coke—the dirtiest of such fuels. The Delhi Government banned the use of coal, which was later extended to the entire National Capital Region. It was also agreed that the thermal power plants would clean up or shut down. Action on this has been patchy to say the least. The lesson from the transition to CNG is that people need alternatives for a ban to be effective. When diesel buses were stopped, CNG supply had to be assured. It also had to be feasible in terms of cost. The Supreme Court agreed that fiscal measures were needed to keep clean fuel cheaper than dirty fuel. Now even as coal is banned, the price of natural gas makes industry uncompetitive.`,
    questions: [26, 27]
  },
  "Passage-5": {
    direction: "Directions for the next 2 (two) items",
    text: `Previous waves of customer-service technology, including email and those pesky voice menus, stoked concerns of job losses, only for them to fail to materialise. AI could yet prove different. And if it does, its effects may be salutary. Human agents could be freed up to spend more time on creative and rewarding tasks, like using feedback to make products and services better—and thereby spend less time listening to irate customers!`,
    questions: [32, 33]
  },
  "Passage-6": {
    direction: "Directions for the next 2 (two) items",
    text: `Cattle from the nearby villages came to the common ground to graze, and there was still a cool freshness in the air. Hori took several deep breaths and thought of sitting down for a while, since he'd be dying of heat in the scorching 'loo' wind the rest of the day. A number of farmers were eager to lease this bit of land and had offered a good price, but Rai Sahib—God bless him—had plainly told them it was reserved for grazing and would not be relinquished for any price. If he'd been one of those selfish Zamindars, he'd have said the cattle could go to hell, that there was no reason for him to miss the chance to make a little money. But the Rai Sahib still held to the old values, feeling that any landlord who didn't look after his tenants was less than human.`,
    questions: [34, 35]
  },
  "Passage-7": {
    direction: "Directions for the next 2 (two) items",
    text: `Was it the sun-dappled ambience, the strawberries and cream, the frustration of Flavio Cobolli's unforced errors against Serbian Novak Djokovic on Centre Court or simply the crushing weight of being a 64-year-old man in the third act of a very public life? Whatever the reason, Hugh Grant, the actor, deserves empathy. There he was, in the Royal Box at Wimbledon, flanked by Britain's well-dressed and well-rested spectators, watching the men's singles quarterfinals, when the actor did something quietly radical: head at a tilt, eyes closed, utterly unbothered, he took a nap. So praise be to Grant for serving up an unexpected ace. In that small, delicious moment, he didn't merely catch forty winks, he made an elegant case for surrender. Not to laziness, but to limits. To the body's quiet wisdom over society's relentless performance metrics. Wimbledon had its tennis. The perpetually sleep-deprived discovered a leading man, not of action, but of rest.`,
    questions: [41, 42]
  },
  "Passage-8": {
    direction: "Directions for the next 2 (two) items",
    text: `The process by which countries close their labour-productivity gap with the technology leader is based on convergence theory. The convergence model divides economic eras into three phases: the breakaway, the catch-up, and the fine-tuning phase. It also divides economic entities into two categories: the technology leaders and the technology followers. The process begins with the development of a new technology, such as scavenging three million years ago (MYA), hunting—one MYA, farming—12 thousand years ago, and industrial technology—a little more than 200 years ago. During the breakaway phase, the per capita income of the technology leaders (e.g., Western Europe and North America in the industrial era) rises, but is unchanged for the technology followers. In the catch-up phase, the followers adopt the new technology and close their per capita income gap with the technology leaders. In the fine-tuning phase, where participants try to extract the remaining benefits from an increasingly exhausted technology, leaders and followers have similar per capita incomes.`,
    questions: [43, 44]
  },
  "Passage-9": {
    direction: "Directions for the next 2 (two) items",
    text: `'Kalagram', the cultural village set up at the Maha Kumbh Mela, unfolded as a mosaic of India's diverse regions, each represented by seven meticulously crafted 'Sanskriti Angans'—stepping through the grand portal was like entering another world. These thematic zones, inspired by iconic temples like the Dakshineshwar Kali Temple and the Brahma Mandir, were treasure troves of regional artistry. Bengal's Pattachitra paintings, Assam's bamboo crafts, Tamil Nadu's Thanjavur paintings, and Madhya Pradesh's tribal sculpture—all were showcased in these living galleries where 230 master artisans breathed life into them using age-old techniques, their hands shaping India's ancient history into creations to behold.`,
    questions: [66, 67]
  },
  "Passage-10": {
    direction: "Directions for the next 2 (two) items",
    text: `Sport is not just about winning medals or getting jobs through a sports quota. Today's generation is struggling with issues like depression and anxiety. Parents often say that their children are inactive and rarely leave the house. Sport can help tackle these problems. From sport you can learn time management, fitness, teamwork, coordination, and so much more. We need to develop a culture in which sport is seen as a way of life—a path to building a healthier, happier society.`,
    questions: [71, 72]
  },
  "Passage-11": {
    direction: "Directions for the next 2 (two) items",
    text: `How is deflation done? Most countries use a method called 'double deflation', where input and output prices are deflated separately. Consider a manufacturer importing oil for use in production. If oil prices fall, output prices do not and quantities remain the same, real value added should not change. But if the same deflator is used for inputs and outputs, as in India, it would look as if the manufacturer had become more productive.`,
    questions: [76, 77]
  }
};

const questions = [
  { number:1, category:"aptitude", topic:"Algebra / Inequalities", question:"For 1/3 < x < y < 2, which of the following statements is/are always correct?", statements:["I. x + 1/x < y + 1/y","II. √(1+y²)/y < √(1+x²)/x"], question_tail:"Select the answer using the code given below.", options:{A:"I only",B:"II only",C:"Both I and II",D:"Neither I nor II"} },
  { number:2, category:"aptitude", topic:"Arithmetic / Measurement", question:"What is the minimum number of times one needs to measure to get 298 litres of water from a tank, if the measuring cylinders have capacities 1 litre, 6 litres, 25 litres and 100 litres?", statements:null, question_tail:null, options:{A:"4",B:"5",C:"9",D:"13"} },
  { number:3, category:"aptitude", topic:"Combinatorics / Counting", question:"There are four types of weights, namely 1 kg, 2 kg, 5 kg and 10 kg. What is the maximum number of different ways one can measure 20 kg, if at least eight but not more than eleven weights of 1 kg are to be used while measuring?", statements:null, question_tail:null, options:{A:"7",B:"8",C:"9",D:"10"} },
  { number:4, category:"aptitude", topic:"Logical Reasoning / Geometry", question:"A cut on a solid object divides the object into two parts where the new surfaces thus produced are plane. On the other hand, one single cut can be used to cut more than one object at a time. In an experiment, the total number of pieces produced by applying n cuts is denoted by x_n. The experiment is performed on a solid cube where pieces remain unmoved after each cut. In this experiment, if after the third cut, the pieces are identical, then which of the following is not a possible value for x_4?", statements:null, question_tail:null, options:{A:"16",B:"12",C:"8",D:"5"} },
  { number:5, category:"aptitude", topic:"Arithmetic / Averages", question:"The class average x in a test increases by 4 when the score of a student is rectified, whose corrected score is 100 instead of 0. Later, the score of another student was found to have been recorded as 81 in place of 56. If there are no other corrections and the final corrected average is y, then y − x is", statements:null, question_tail:null, options:{A:"2",B:"3",C:"5",D:"6"} },
  { number:6, category:"reading_comprehension", topic:"Passage Comprehension / Conclusions", passage_id:"Passage-1", question:"Which of the following conclusions is/are valid?", statements:["1. Though SARS-CoV-2 and HMPV are similar viruses with somewhat different epidemiology, the former became a pandemic because it was novel and people had not been exposed to it in the past.","2. The two viruses have fundamentally different impacts on human populations and should not therefore be dealt with in a similar manner."], question_tail:"Select the answer using the code given below.", options:{A:"1 only",B:"2 only",C:"Both 1 and 2",D:"Neither 1 nor 2"} },
  { number:7, category:"reading_comprehension", topic:"Passage Comprehension / Writer's Intent", passage_id:"Passage-1", question:"Which of the following reflect the intent of the writer in the above passage?", statements:["1. To evolve methodologies for objective analysis of the two viruses","2. To establish the epidemiological similarities and differences between the two viruses","3. To offer a better understanding of the remedies of HMPV when analysed in conjunction with SARS-CoV-2"], question_tail:"Select the answer using the code given below.", options:{A:"1 and 2",B:"2 and 3",C:"1 and 3",D:"None of the above"} },
  { number:8, category:"reading_comprehension", topic:"Passage Comprehension / Logical Inferences", passage_id:"Passage-1", question:"Which of the following statements reflect the logical and rational inferences that can be drawn from the passage?", statements:["1. HMPV has, historically, had longer documentation of studies when compared with SARS-CoV-2.","2. The two viruses are different from each other and this results in markedly different outcomes amongst those affected.","3. Long-term impacts of the two viruses are dissimilar and this is an important differentiator between them.","4. One of the common factors between the two viruses is seasonal specificity."], question_tail:"Select the answer using the code given below.", options:{A:"1 and 2 only",B:"1, 2 and 3",C:"3 and 4",D:"1 and 3 only"} },

var _filter = 'all';

function el(tag, cls) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function renderText(text) {
  var frag = document.createDocumentFragment();
  if (!text) return frag;
  var lines = String(text).split('\n');
  lines.forEach(function(line, li) {
    if (li > 0) frag.appendChild(document.createElement('br'));
    var parts = line.split('*');
    parts.forEach(function(part, i) {
      if (!part) return;
      if (i % 2 === 1) {
        var em = document.createElement('em'); em.textContent = part; frag.appendChild(em);
      } else {
        var notParts = part.split(/( NOT | not )/g);
        notParts.forEach(function(np) {
          if (!np) return;
          if (np === ' NOT ' || np === ' not ') {
            frag.appendChild(document.createTextNode(' '));
            var strong = document.createElement('strong'); strong.textContent = np.trim(); frag.appendChild(strong);
            frag.appendChild(document.createTextNode(' '));
          } else {
            frag.appendChild(document.createTextNode(np));
          }
        });
      }
    });
  });
  return frag;
}

function appendText(node, text) { node.appendChild(renderText(text)); }

function buildFullQuestion(q) {
  var wrap = el('div');

  if (q.passage_id && passages[q.passage_id]) {
    var p = passages[q.passage_id];
    var pBlock = el('div', 'q-passage-block');
    var pDir = el('div', 'passage-dir'); pDir.textContent = p.direction; pBlock.appendChild(pDir);
    var pText = el('div', 'passage-body'); appendText(pText, p.text); pBlock.appendChild(pText);
    wrap.appendChild(pBlock);
  }

  if (q.question) {
    var lead = el('div', 'q-lead'); appendText(lead, q.question); wrap.appendChild(lead);
  }

  if (q.statements && q.statements.length) {
    var ul = el('ul', 'statements');
    q.statements.forEach(function(s) {
      var li = el('li'); appendText(li, s || ''); ul.appendChild(li);
    });
    wrap.appendChild(ul);
  }

  if (q.question_tail) {
    var tail = el('div', 'q-tail'); appendText(tail, q.question_tail); wrap.appendChild(tail);
  }

  var opts = q.options || {};
  var keys = Object.keys(opts);
  var longOpt = keys.some(function(k) { return (opts[k] || '').length > 40; });
  var optDiv = el('div', longOpt ? 'options single-col' : 'options');
  keys.forEach(function(k) {
    var opt = el('div', 'option');
    opt.addEventListener('click', function() {
      optDiv.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); });
      opt.classList.add('selected');
    });
    var key = el('span', 'opt-key'); key.textContent = k;
    var val = el('span', 'opt-text'); appendText(val, opts[k] || '');
    opt.appendChild(key); opt.appendChild(val);
    optDiv.appendChild(opt);
  });
  wrap.appendChild(optDiv);
  return wrap;
}


function buildSection(label, filteredQs) {
  if (!filteredQs.length) return null;
  var section = el('div', 'subject-section');

  var heading = el('div', 'subject-heading');
  heading.appendChild(document.createTextNode(label));
  var small = el('small');
  small.textContent = filteredQs.length + ' question' + (filteredQs.length !== 1 ? 's' : '');
  heading.appendChild(small);
  section.appendChild(heading);

  var tbl = document.createElement('table');
  tbl.className = 'subj-tbl';
  var thead = tbl.createTHead();
  var hrow = thead.insertRow();
  ['Q#', 'Topic', 'Question'].forEach(function(h) {
    var th = document.createElement('th'); th.textContent = h; hrow.appendChild(th);
  });
  var tbody = tbl.createTBody();

  filteredQs.forEach(function(q) {
    var tr = tbody.insertRow();

    var tdNum = tr.insertCell();
    tdNum.className = 'col-num';
    tdNum.textContent = 'Q' + q.number;

    var tdTopic = tr.insertCell();
    tdTopic.className = 'col-topic';
    tdTopic.textContent = q.topic || '—';

    var tdQuestion = tr.insertCell();
    tdQuestion.className = 'col-question';
    tdQuestion.appendChild(buildFullQuestion(q));
  });

  section.appendChild(tbl);
  return section;
}

function getFiltered() {
  return questions.filter(function(q) {
    return _filter === 'all' || q.category === _filter;
  });
}

function renderContent() {
  var container = document.getElementById('content');
  container.textContent = '';
  var filtered = getFiltered();

  document.querySelector('.count-num').textContent = filtered.length;
  document.querySelector('.count-label').textContent = ' question' + (filtered.length !== 1 ? 's' : '');

  var cats = [
    { key: 'aptitude', label: 'Aptitude' },
    { key: 'reading_comprehension', label: 'Reading Comprehension' },
    { key: 'reasoning_ability', label: 'Reasoning Ability' }
  ];

  cats.forEach(function(cat) {
    var qs = filtered.filter(function(q) { return q.category === cat.key; });
    var section = buildSection(cat.label, qs);
    if (section) container.appendChild(section);
  });

  if (!filtered.length) {
    var empty = el('div', 'empty');
    empty.textContent = 'NO QUESTIONS MATCH';
    container.appendChild(empty);
  }
}

document.querySelectorAll('[data-filter]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelector('.btn-all').classList.remove('inactive');
    document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('active'); });
    if (btn.dataset.filter === 'all') {
      document.querySelector('.btn-all').classList.remove('inactive');
    } else {
      document.querySelector('.btn-all').classList.add('inactive');
      btn.classList.add('active');
    }
    _filter = btn.dataset.filter;
    renderContent();
  });
});

function initFilterCounts() {
  var counts = {};
  questions.forEach(function(q) { counts[q.category] = (counts[q.category] || 0) + 1; });
  document.querySelectorAll('[data-filter]').forEach(function(btn) {
    var f = btn.dataset.filter;
    var n = f === 'all' ? questions.length : (counts[f] || 0);
    btn.textContent = btn.textContent + ' (' + n + ')';
  });
}

document.addEventListener('DOMContentLoaded', function() { initFilterCounts(); renderContent(); });
</script>
