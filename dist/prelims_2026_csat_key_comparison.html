ne</span></div><div class=\"q-legend-row\"><span class=\"opt-key\">C</span><span>Select this option if the question can be answered using both the statements together, but cannot be answered using either statement alone</span></div><div class=\"q-legend-row\"><span class=\"opt-key\">D</span><span>Select this option if the question cannot be answered even using any of the statements</span></div></div><div class=\"q-lead\">X is a collection of certain odd numbers whereas Y is a collection of certain even numbers. T consists of the numbers all of which are either from X or from Y. Is every number of T from Y?</div><ul class=\"q-stmts\"><li><span class=\"stmt-lbl\">I.</span> The sum of any two numbers belonging to T is even.</li><li><span class=\"stmt-lbl\">II.</span> If both p and q are picked from T, then (p − 1)q is even.</li></ul><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">Select this option if the question can be answered using one of these statements alone, but cannot be answered using other statement</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">Select this option if the question can be answered using either statement alone</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Select this option if the question can be answered using both the statements together, but cannot be answered using either statement alone</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Select this option if the question cannot be answered even using any of the statements</span></div></div>","category":"data_interpretation","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"A","Vision IAS":"D","UPSC Official":"D"},"status":"disagree"},"5":{"setAQ":5,"codeQNums":{"A":5,"B":75,"C":35,"D":65},"qHtml":"<div class=\"q-cat-tag q-cat-data_interpretation\">Data Interpretation</d  cannot be answered even using any of the statements</span></div></div>","category":"data_interpretation","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"A","Super Kalam":"A","Vision IAS":"A","UPSC Official":"A"},"status":"agree"},"6":{"setAQ":6,"codeQNums":{"A":6,"B":76,"C":36,"D":66},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">'Kalagram', the cultural village set up at the Maha Kumbh Mela, unfolded as a mosaic of India's diverse regions, each represented by seven meticulously crafted 'Sanskriti Angans'—stepping through the grand portal was like entering another world. These thematic zones, inspired by iconic temples like the Dakshineshwar Kali Temple and the Brahma Mandir, were treasure troves of regional artistry. Bengal's Pattachitra paintings, Assam's bamboo crafts, Tamil Nadu's Thanjavur paintings, and Madhya Pradesh's tribal sculpture—all were showcased in these living galleries where 230 master artisans breathed life into them using age-old techniques, their hands shaping India's ancient history into creations to behold.</div><div class=\"q-lead\">Which of the following conclusions are valid?\n1. Seven Sanskriti Angans, representing different regions of India, had been showcased in Kalagram.\n2. Regional artistry was recognised via the inspiration drawn from iconic temples.\n3. India's ancient history had been crafted by the contemporary craftsmanship of 230 artisans into creations to behold.\n4. Art forms from all regions of India had been showcased in these living galleries.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2, 3 and 4</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">1, 2 and 4</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1 and 3</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"A"},"status":"disagree"},"7":{"setAQ":7,"codeQNums":{"A":7,"B":77,"C":37,"D":67},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">'Kalagram', the cultural village set up at the Maha Kumbh Mela, unfolded as a mosaic of India's diverse regions, each represented by seven meticulously crafted 'Sanskriti Angans'—stepping through the grand portal was like entering another world. These thematic zones, inspired by iconic temples like the Dakshineshwar Kali Temple and the Brahma Mandir, were treasure troves of regional artistry. Bengal's Pattachitra paintings, Assam's bamboo crafts, Tamil Nadu's Thanjavur paintings, and Madhya Pradesh's tribal sculpture—all were showcased in these living galleries where 230 master artisans breathed life into them using age-old techniques, their hands shaping India's ancient history into creations to behold.</div><div class=\"q-lead\">Which one of the following statements is not correct?</div><div class=\"options\"><div class=\"option opt-agree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">Paintings from four States of India have been mentioned.</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">Stepping into Kalagram is likened to stepping into another world.</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">The Angans have been described as living galleries.</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Kalagram is divided into thematic zones, inspired by well-known temples of India.</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"A","Super Kalam":"A","Vision IAS":"A","UPSC Official":"A"},"status":"agree"},"8":{"setAQ":8,"codeQNums":{"A":8,"B":78,"C":38,"D":68},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">The weight of X, in kg, is denoted by X. The weights of A, B, C, D, P, Q, R and S are measured. Given :\nA + B + C + D = 17\nA + C = 6\nP + Q + S + D = 15\nP + Q + R + B = 17\nP = R and Q = S\nWhich one of the following statements is correct?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">B and D together weigh less than the total weight of P and Q.</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">P and Q together weigh more than the total weight of A and C.</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">P weighs more than Q.</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Q weighs more than P.</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"9":{"setAQ":9,"codeQNums":{"A":9,"B":79,"C":39,"D":69},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">How many words can one form by shuffling the letters of the word QUEUE, if Q is always followed by U? The words thus formed need not necessarily have any meaning.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">6</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">8</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">10</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">12</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"10":{"setAQ":10,"codeQNums":{"A":10,"B":80,"C":40,"D":70},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">X, Y and Z jump forward 4', 6' and 5', respectively. At 8 AM, they all land on mark 199'. How many times will they all land on the same mark (need not be at the same moment) between mark 195' and 1000', if all of them cross mark 1000' by 9 AM?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">11</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">12</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">13</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">14</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"11":{"setAQ":11,"codeQNums":{"A":11,"B":61,"C":21,"D":71},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">Sport is not just about winning medals or getting jobs through a sports quota. Today's generation is struggling with issues like depression and anxiety. Parents often say that their children are inactive and rarely leave the house. Sport can help tackle these problems. From sport you can learn time management, fitness, teamwork, coordination, and so much more. We need to develop a culture in which sport is seen as a way of life—a path to building a healthier, happier society.</div><div class=\"q-lead\">Which of the following conclusions are valid?\n1. Sport is more than just games; it is a way of life.\n2. Sport can help mitigate the problems of seclusion among the young.\n3. Earning laurels in sport can help one secure a job on the basis of an assigned quota.\n4. Standard corporate sector skills cannot be learnt through sport.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 3 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 and 4 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">1, 2 and 4</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1, 2 and 3</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"C","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"disagree"},"12":{"setAQ":12,"codeQNums":{"A":12,"B":62,"C":22,"D":72},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">Sport is not just about winning medals or getting jobs through a sports quota. Today's generation is struggling with issues like depression and anxiety. Parents often say that their children are inactive and rarely leave the house. Sport can help tackle these problems. From sport you can learn time management, fitness, teamwork, coordination, and so much more. We need to develop a culture in which sport is seen as a way of life—a path to building a healthier, happier society.</div><div class=\"q-lead\">Which of the following statements is/are correct?\n1. Parents are not encouraging enough when it comes to children playing sport.\n2. Participation in sporting activities can help develop life skills.\n3. Sport as a way of life can help evolve the very nature of society itself.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 3</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 and 3</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">2 only</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">3 only</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"C","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"disagree"},"13":{"setAQ":13,"codeQNums":{"A":13,"B":63,"C":23,"D":73},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">A toy T jumps forward or backward. In each forward jump, it moves 5' forward whereas in each backward jump, it moves 2' backward. If in 31 jumps, T moves exactly 15' forward, then what is the difference of the number of forward and backward jumps?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">6</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">7</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">8</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">9</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"14":{"setAQ":14,"codeQNums":{"A":14,"B":64,"C":24,"D":74},"qHtml":"<div class=\"q-cat-tag q-cat-logical_reasoning\">Logical Reasoning</div><div class=\"q-lead\">Eight persons P, Q, R, S, T, U, V and W sit around a round table in eight different seats placed with equal distance between any two consecutive seats. Both P and R are adjacent to Q. Both T and R are adjacent to S. Both U and W are adjacent to V. S and W are on opposite chairs. If while going in the clockwise direction around the table from P, one meets R before T, then how many persons shall Q cross while moving in the clockwise direction around the table before meeting W?</div><div class=\"options\"><div class=\"option opt-agree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">5</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">4</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">2</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1</span></div></div>","category":"logical_reasoning","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"A","Super Kalam":"A","Vision IAS":"A","UPSC Official":"A"},"status":"agree"},"15":{"setAQ":15,"codeQNums":{"A":15,"B":65,"C":25,"D":75},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">The top of a table is rectangular and its dimensions are 6' × 10'. Two rectangular portions of the table top are painted in blue colour; both these portions have dimensions 2·5' × 8' and each of them has exactly two sides common with two edges of the table top. If the table is fixed to the ground and the remaining portion of the table top is painted in white, how many different patterns are possible when observed from above?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">2</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">4</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">6</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">8</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"B","UPSC Official":"B"},"status":"disagree"},"16":{"setAQ":16,"codeQNums":{"A":16,"B":66,"C":26,"D":76},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">How is deflation done? Most countries use a method called 'double deflation', where input and output prices are deflated separately. Consider a manufacturer importing oil for use in production. If oil prices fall, output prices do not and quantities remain the same, real value added should not change. But if the same deflator is used for inputs and outputs, as in India, it would look as if the manufacturer had become more productive.</div><div class=\"q-lead\">Which of the following statements is/are correct?\n1. Real value should not change in the instance of static output cost and unchanged quantities against falling oil prices.\n2. Deflators are to be used separately for inputs and outputs, and this is a practice universally adopted by all economies.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both 1 and 2</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither 1 nor 2</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"A","Super Kalam":"A","Vision IAS":"A","UPSC Official":"D"},"status":"disagree"},"17":{"setAQ":17,"codeQNums":{"A":17,"B":67,"C":27,"D":77},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">How is deflation done? Most countries use a method called 'double deflation', where input and output prices are deflated separately. Consider a manufacturer importing oil for use in production. If oil prices fall, output prices do not and quantities remain the same, real value added should not change. But if the same deflator is used for inputs and outputs, as in India, it would look as if the manufacturer had become more productive.</div><div class=\"q-lead\">Which of the following assumptions is/are valid?\n1. Deflation strategies can be used to make manufacturers appear to be doing better than they actually are.\n2. When input and output prices are both deflated against a single input price, it is referred to as 'double deflation'.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option opt-agree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both 1 and 2</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither 1 nor 2</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"A","Super Kalam":"A","Vision IAS":"A","UPSC Official":"A"},"status":"agree"},"18":{"setAQ":18,"codeQNums":{"A":18,"B":68,"C":28,"D":78},"qHtml":"<div class=\"q-cat-tag q-cat-general_mental_ability\">General Mental Ability</div><div class=\"q-lead\">A pattern formed by two characters a and b is repeated more than once in the following string :\n× b × a × a × × a × a × bab\nWhat is × × in the 7th and 8th positions from the left in the above string?</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">aa</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">ab</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">ba</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">bb</span></div></div>","category":"general_mental_ability","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"A","Vision IAS":"D","UPSC Official":"D"},"status":"disagree"},"19":{"setAQ":19,"codeQNums":{"A":19,"B":69,"C":29,"D":79},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">If 10ᵐ × 1000 × n = 75²⁵ × 25³² × 32⁷⁵, where n is not divisible by 10, then the value of m is</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">101</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">111</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">121</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">131</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"20":{"setAQ":20,"codeQNums":{"A":20,"B":70,"C":null,"D":80},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">The speed of a train T is 100 km per hour and the speed of a person P is 4 km per hour. T crosses P in 15 seconds, if P travels along the direction of motion of T. If P travels along the opposite direction of T, then in how much time does T cross P, in seconds, approximately?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">13·51</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">13·65</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">13·85</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">14·05</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"21":{"setAQ":21,"codeQNums":{"A":21,"B":51,"C":11,"D":1},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">For 1/3 &lt; x &lt; y &lt; 2, which of the following statements is/are always correct?\nI. x + 1/x &lt; y + 1/y\nII. √(1 + y²)/y &lt; √(1 + x²)/x\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">I only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">II only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both I and II</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither I nor II</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"22":{"setAQ":22,"codeQNums":{"A":22,"B":52,"C":12,"D":2},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">What is the minimum number of times one needs to measure to get 298 litres of water from a tank, if the measuring cylinders have capacities 1 litre, 6 litres, 25 litres and 100 litres?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">4</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">5</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">9</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">13</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"23":{"setAQ":23,"codeQNums":{"A":23,"B":53,"C":13,"D":3},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">There are four types of weights, namely 1 kg, 2 kg, 5 kg and 10 kg. What is the maximum number of different ways one can measure 20 kg, if at least eight but not more than eleven weights of 1 kg are to be used while measuring?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">7</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">8</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">9</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">10</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"24":{"setAQ":24,"codeQNums":{"A":24,"B":54,"C":14,"D":4},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">A cut on a solid object divides the object into two parts where the new surfaces thus produced are plane. On the other hand, one single cut can be used to cut more than one object at a time. In an experiment, the total number of pieces produced by applying n cuts is denoted by xₙ. The experiment is performed on a solid cube where pieces remain unmoved after each cut. In this experiment, if after the third cut, the pieces are identical, then which of the following is not a possible value for x₄?</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">16</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">12</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">8</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">5</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"A","UPSC Official":"A"},"status":"disagree"},"25":{"setAQ":25,"codeQNums":{"A":25,"B":55,"C":15,"D":5},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">The class average x in a test increases by 4 when the score of a student is rectified, whose corrected score is 100 instead of 0. Later, the score of another student was found to have been recorded as 81 in place of 56. If there are no other corrections and the final corrected average is y, then y − x is</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">2</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">3</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">5</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">6</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"A","Vision IAS":"B","UPSC Official":"B"},"status":"disagree"},"26":{"setAQ":26,"codeQNums":{"A":26,"B":56,"C":16,"D":6},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">When SARS-CoV-2 was first detected in 2019, it was a truly novel virus for the world. At that time, no one in the world had been exposed to SARS-CoV-2 or had specific immunity against it. In contrast, people across the world have been exposed to HMPV for decades and the virus is well-studied. HMPV and SARS-CoV-2 belong to two very different virus families with fundamentally different characteristics and epidemiology, with strong seasonality seen in HMPV, unlike SARS-CoV-2. Both viruses cause different severity of symptoms, particularly over the long term, and the affected population segments do not fully overlap. In general, HMPV causes milder illness with deaths being very rare and with no long-term post-viral symptoms.</div><div class=\"q-lead\">Which of the following conclusions is/are valid?\n1. Though SARS-CoV-2 and HMPV are similar viruses with somewhat different epidemiology, the former became a pandemic because it was novel and people had not been exposed to it in the past.\n2. The two viruses have fundamentally different impacts on human populations and should not therefore be dealt with in a similar manner.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both 1 and 2</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither 1 nor 2</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"D","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"disagree"},"27":{"setAQ":27,"codeQNums":{"A":27,"B":57,"C":17,"D":7},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">When SARS-CoV-2 was first detected in 2019, it was a truly novel virus for the world. At that time, no one in the world had been exposed to SARS-CoV-2 or had specific immunity against it. In contrast, people across the world have been exposed to HMPV for decades and the virus is well-studied. HMPV and SARS-CoV-2 belong to two very different virus families with fundamentally different characteristics and epidemiology, with strong seasonality seen in HMPV, unlike SARS-CoV-2. Both viruses cause different severity of symptoms, particularly over the long term, and the affected population segments do not fully overlap. In general, HMPV causes milder illness with deaths being very rare and with no long-term post-viral symptoms.</div><div class=\"q-lead\">Which of the following reflect the intent of the writer in the above passage?\n1. To evolve methodologies for objective analysis of the two viruses\n2. To establish the epidemiological similarities and differences between the two viruses\n3. To offer a better understanding of the remedies of HMPV when analysed in conjunction with SARS-CoV-2\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 and 3</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">1 and 3</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">None of the above</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"28":{"setAQ":28,"codeQNums":{"A":28,"B":58,"C":18,"D":8},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">When SARS-CoV-2 was first detected in 2019, it was a truly novel virus for the world. At that time, no one in the world had been exposed to SARS-CoV-2 or had specific immunity against it. In contrast, people across the world have been exposed to HMPV for decades and the virus is well-studied. HMPV and SARS-CoV-2 belong to two very different virus families with fundamentally different characteristics and epidemiology, with strong seasonality seen in HMPV, unlike SARS-CoV-2. Both viruses cause different severity of symptoms, particularly over the long term, and the affected population segments do not fully overlap. In general, HMPV causes milder illness with deaths being very rare and with no long-term post-viral symptoms.</div><div class=\"q-lead\">Which of the following statements reflect the logical and rational inferences that can be drawn from the passage?\n1. HMPV has, historically, had longer documentation of studies when compared with SARS-CoV-2.\n2. The two viruses are different from each other and this results in markedly different outcomes amongst those affected.\n3. Long-term impacts of the two viruses are dissimilar and this is an important differentiator between them.\n4. One of the common factors between the two viruses is seasonal specificity.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2 only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">1, 2 and 3</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">3 and 4</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1 and 3 only</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"29":{"setAQ":29,"codeQNums":{"A":29,"B":59,"C":19,"D":9},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">Three variables x, y and z take values 2, 3, 4 or 5 such that their values are always distinct. If M and N denote the largest possible value and the smallest possible value, respectively, for the expression {(x × y) + z}; then M − N is</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">11</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">12</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">13</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">14</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"30":{"setAQ":30,"codeQNums":{"A":30,"B":60,"C":20,"D":10},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">Suppose x, y and z are variables taking positive real numbers as their possible values. It is given that y is directly proportional to x² and x is inversely proportional to z. For z = 7/25, the values of x and y are 5 and 50, respectively. If y = 98, what is z equal to?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1/7</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">1/5</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">5/7</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"31":{"setAQ":31,"codeQNums":{"A":31,"B":41,"C":1,"D":11},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">India is starting to deploy AI for critical use cases such as weather forecasting, pest detection and control, and crop yield optimisation. However, penetration is limited to a small subset of tech-savvy farmers. In the US and in Europe, generative AI tools have started offering precision farming at scale, integrating large datasets to provide real-time agronomic insights. For at-scale integration and accessibility of AI tools in India, it would be helpful to develop Indian languages-based AI tools for smallholder farmers, partner with AgTechs to create affordable AI solutions, and disseminate AI-based advisory services through government programmes.</div><div class=\"q-lead\">Which of the following assumptions is/are valid?\n1. Agricultural productivity has marched ahead in the West because of the economies of scale facilitated by the adoption of AI tools.\n2. Affordable AI tools rendered available in local languages can help AI-based solutions reach more and more small farmers.\n3. Though penetration is as yet low, critical application areas deploying AI tools are already in use in India.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1, 2 and 3</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">1 and 3 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">2 and 3 only</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"B","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"disagree"},"32":{"setAQ":32,"codeQNums":{"A":32,"B":42,"C":2,"D":12},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">India is starting to deploy AI for critical use cases such as weather forecasting, pest detection and control, and crop yield optimisation. However, penetration is limited to a small subset of tech-savvy farmers. In the US and in Europe, generative AI tools have started offering precision farming at scale, integrating large datasets to provide real-time agronomic insights. For at-scale integration and accessibility of AI tools in India, it would be helpful to develop Indian languages-based AI tools for smallholder farmers, partner with AgTechs to create affordable AI solutions, and disseminate AI-based advisory services through government programmes.</div><div class=\"q-lead\">Which of the following statements is/are not correct?\n1. Tech-savvy farmers will drive the AgTech companies of the future.\n2. The development of advisory services by the government programmes for the use of AI tools in agriculture would be helpful.\n3. In the US and Europe, AI tools have replaced traditional agricultural practices.\n4. The integration of large datasets for use in real-time agronomic analysis is already a reality.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option opt-agree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 3 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">1, 3 and 4</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">2 and 4</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">3 only</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"A","Super Kalam":"A","Vision IAS":"A","UPSC Official":"A"},"status":"agree"},"33":{"setAQ":33,"codeQNums":{"A":33,"B":43,"C":3,"D":13},"qHtml":"<div class=\"q-cat-tag q-cat-logical_reasoning\">Logical Reasoning</div><div class=\"q-lead\">P, Q, R, S and T are ranked 1 to 5 (not necessarily in that order). The rank of P is 4, the rank of Q is not 5, the rank of R is 1, the rank of S is not 2, the rank of T is not 3. Then which of the following is/are correct?\nI. If the rank of S is 3, then that of T is 2.\nII. If the rank of Q is 3, then that of T is 5.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">I only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">II only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both I and II</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither I nor II</span></div></div>","category":"logical_reasoning","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"34":{"setAQ":34,"codeQNums":{"A":34,"B":44,"C":4,"D":14},"qHtml":"<div class=\"q-cat-tag q-cat-logical_reasoning\">Logical Reasoning</div><div class=\"q-lead\">Two identical straight rods are painted in five distinct colours so that each of them gets divided into five equal parts along the length. In one of them, the portions are marked P1, P2, P3, P4 and P5 (not necessarily in that order) whereas in the other, they are marked Q1, Q2, Q3, Q4 and Q5 (not necessarily in that order). When the rods are kept parallel to each other side by side, P1 and Q3 match, P4 matches Q1 or Q2, and Q4 matches P3 or P5. If Q3 and Q5 are adjacent, which of the following is/are possible?\nI. Q3 is marked at the middle portion of the straight rod.\nII. P2 is marked at one of the extreme portions of the straight rod.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">I only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">II only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both I and II</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither I nor II</span></div></div>","category":"logical_reasoning","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"35":{"setAQ":35,"codeQNums":{"A":35,"B":45,"C":5,"D":15},"qHtml":"<div class=\"q-cat-tag q-cat-logical_reasoning\">Logical Reasoning</div><div class=\"q-lead\">Seven persons A, B, C, D, E, F and G travel by three cars X, Y, Z. A and another two of them travel by X. Only E travels with G. C travels by Z, but B does not travel by Y. Besides, A and B do not travel by the same car. Then which of the following are correct?\nI. No one travels alone.\nII. Only D travels with F.\nIII. Only C travels with B.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">I and II only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">I and III only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">II and III only</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">All the three</span></div></div>","category":"logical_reasoning","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"36":{"setAQ":36,"codeQNums":{"A":36,"B":46,"C":6,"D":16},"qHtml":"<div class=\"q-cat-tag q-cat-logical_reasoning\">Logical Reasoning</div><div class=\"q-lead\">There are four statements X, Y, Z and W. Their relations are as follows :\nIf X is incorrect, then so is Z; if Y is incorrect, then W is correct; if W is correct, then X is incorrect.\nWhich of the following is/are correct?\nI. If X is correct, then so is Y.\nII. If Z is correct, then it is not necessary that Y is correct.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">I only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">II only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both I and II</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither I nor II</span></div></div>","category":"logical_reasoning","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"A","Super Kalam":"A","Vision IAS":"A/B","UPSC Official":"A"},"status":"disagree"},"37":{"setAQ":37,"codeQNums":{"A":37,"B":47,"C":7,"D":17},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">X and Y are two runners who run for the same duration of time on the same circular track. They started running at the same time in the same direction with uniform speeds. When X completed 7 rounds, Y did exactly 5. After completing 5 rounds, Y changed his direction and started running in the opposite direction with speed which is double of his earlier speed. On the other hand, X continued to run with the same speed. They stopped running when X completed exactly 21 rounds. How many times did X and Y meet after they had started and before they finally stopped?</div><div class=\"options\"><div class=\"option opt-agree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">35</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">34</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">31</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">29</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"A","Super Kalam":"A","Vision IAS":"A","UPSC Official":"A"},"status":"agree"},"38":{"setAQ":38,"codeQNums":{"A":38,"B":48,"C":8,"D":18},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">In an objective type question paper, 5 marks are awarded for a correct answer and 2 marks are deducted for a wrong answer. A student attempted all the questions and got a score of 69. Had he been awarded 4 marks for a correct answer and 1 mark deducted for a wrong answer, he would have scored 84. How many questions were there in the question paper?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">99</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">81</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">84</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">79</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"39":{"setAQ":39,"codeQNums":{"A":39,"B":49,"C":9,"D":19},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">The Juvenile Justice (Care and Protection of Children) Act, or the JJ Act, 2015 allows for the possibility for trying adolescents above 16 as adults if they are accused of committing a heinous offence. A heinous offence is one with a minimum punishment of seven years. Offences such as culpable homicide and causing death by negligence, which are common in drunken driving cases, are not heinous offences because they do not have a prescribed minimum punishment. The JJ Act, amended in 2021, now categorises an offence that has no minimum sentence, but has a maximum sentence of seven years or more as a serious offence which nonetheless, in the opinion of activists, does not merit the transfer of a case to the adult criminal justice system.</div><div class=\"q-lead\">Which of the following conclusions is/are valid?\n1. Only a serious offence as categorised by the revised JJ Act, justifies the transfer of a case to the adult judicial system.\n2. The JJ Act, 2021, categorises an offence as a serious offence based on the maximum sentence it carries, rather than on the minimum sentence.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both 1 and 2</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither 1 nor 2</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B/C","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"disagree"},"40":{"setAQ":40,"codeQNums":{"A":40,"B":50,"C":10,"D":20},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">The Juvenile Justice (Care and Protection of Children) Act, or the JJ Act, 2015 allows for the possibility for trying adolescents above 16 as adults if they are accused of committing a heinous offence. A heinous offence is one with a minimum punishment of seven years. Offences such as culpable homicide and causing death by negligence, which are common in drunken driving cases, are not heinous offences because they do not have a prescribed minimum punishment. The JJ Act, amended in 2021, now categorises an offence that has no minimum sentence, but has a maximum sentence of seven years or more as a serious offence which nonetheless, in the opinion of activists, does not merit the transfer of a case to the adult criminal justice system.</div><div class=\"q-lead\">Which of the following statements is/are correct?\n1. If an offence has no minimum prescribed punishment, it cannot be considered heinous as per the JJ Act, 2015.\n2. As per the JJ Act, 2021, an offence for which there is a provision for a maximum sentence of seven years or more, but no minimum sentence, is to be considered a serious offence.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both 1 and 2</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither 1 nor 2</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"41":{"setAQ":41,"codeQNums":{"A":41,"B":31,"C":71,"D":21},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">An explosion takes place at a certain distance from an army camp. As soon as the sensor in the camp receives the sound of the explosion, a drone starts flying towards the spot of explosion. The drone clicks a picture from the spot and the camp receives it at the same time. Immediately another drone starts flying to the spot and it also sends a picture as soon as it reaches the spot. The two pictures were received at 5:02 PM and 5:05 PM, respectively. If the speed of the drones is 30 m/s, at what time did the explosion take place? Assume that the speed of sound is 300 m/s.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">4:59:00 PM</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">4:59:02 PM</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">4:58:42 PM</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">4:56:32 PM</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"42":{"setAQ":42,"codeQNums":{"A":42,"B":32,"C":72,"D":22},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">The digit in the unit place of the number 6¹²⁹ × 7³⁰⁷ is</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">2</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">4</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">8</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">6</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"43":{"setAQ":43,"codeQNums":{"A":43,"B":33,"C":73,"D":23},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">A person saves 10% of his salary every month. If his salary increases by 12% and the expenditure increases by 10%, then what will be the change in his saving per month?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">20% increase</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">30% increase</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">03% decrease</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">02% decrease</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"44":{"setAQ":44,"codeQNums":{"A":44,"B":34,"C":74,"D":24},"qHtml":"<div class=\"q-cat-tag q-cat-logical_reasoning\">Logical Reasoning</div><div class=\"q-lead\">P has a son and a daughter. S is the mother of T. S is R's spouse. Q and R are children of P. Then how is Q related to S?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">Q is a sister of S</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">Q is a daughter of S</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Q is the mother of S</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Q is a sister of the husband of S</span></div></div>","category":"logical_reasoning","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"45":{"setAQ":45,"codeQNums":{"A":45,"B":35,"C":75,"D":25},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">How many three-digit numbers can be expressed as an integral power of 2?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">3</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">4</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"46":{"setAQ":46,"codeQNums":{"A":46,"B":36,"C":76,"D":26},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">The key source of the battle for clean skies and clear lungs is the fuel we burn—from household Chulhas to the thermal power plants. In most cases, it is biomass or coal. The Supreme Court banned the use of pet coke—the dirtiest of such fuels. The Delhi Government banned the use of coal, which was later extended to the entire National Capital Region. It was also agreed that the thermal power plants would clean up or shut down. Action on this has been patchy to say the least. The lesson from the transition to CNG is that people need alternatives for a ban to be effective. When diesel buses were stopped, CNG supply had to be assured. It also had to be feasible in terms of cost. The Supreme Court agreed that fiscal measures were needed to keep clean fuel cheaper than dirty fuel. Now even as coal is banned, the price of natural gas makes industry uncompetitive.</div><div class=\"q-lead\">Which of the following inferences is/are correct?\n1. The source of the energy we consume is the key to the battle for cleaner air.\n2. Bans are effective where the will is strong and the people are convinced that such bans are for the greater good of society.\n3. There is judicial approval for a policy that intervenes fiscally to facilitate benevolent pricing for cleaner fuel.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 and 3</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">1 and 3</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1 only</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"47":{"setAQ":47,"codeQNums":{"A":47,"B":37,"C":77,"D":27},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">The key source of the battle for clean skies and clear lungs is the fuel we burn—from household Chulhas to the thermal power plants. In most cases, it is biomass or coal. The Supreme Court banned the use of pet coke—the dirtiest of such fuels. The Delhi Government banned the use of coal, which was later extended to the entire National Capital Region. It was also agreed that the thermal power plants would clean up or shut down. Action on this has been patchy to say the least. The lesson from the transition to CNG is that people need alternatives for a ban to be effective. When diesel buses were stopped, CNG supply had to be assured. It also had to be feasible in terms of cost. The Supreme Court agreed that fiscal measures were needed to keep clean fuel cheaper than dirty fuel. Now even as coal is banned, the price of natural gas makes industry uncompetitive.</div><div class=\"q-lead\">Which of the following statements is/are correct?\n1. Thermal power stations in Delhi were required to summarily shut down.\n2. CNG supplies had to be assured once diesel vehicles were prohibited from plying.\n3. The Supreme Court banned the use of coal across the National Capital Region.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">3 only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">2 only</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">2 and 3</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"48":{"setAQ":48,"codeQNums":{"A":48,"B":38,"C":78,"D":28},"qHtml":"<div class=\"q-cat-tag q-cat-logical_reasoning\">Logical Reasoning</div><div class=\"q-lead\">Consider the following statements :\nEvery red is blue. Every blue is green. Every green is yellow.\nWhich of the following statements denoted by P, Q and R are correct?\nP. Every blue is yellow.\nQ. Every red is green.\nR. Every red is yellow.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">P and Q only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">Q and R only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">P and R only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">P, Q and R</span></div></div>","category":"logical_reasoning","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"49":{"setAQ":49,"codeQNums":{"A":49,"B":39,"C":79,"D":29},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">How many times does 5 appear in all two-digit positive integers?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">18</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">19</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">20</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">21</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"50":{"setAQ":50,"codeQNums":{"A":50,"B":40,"C":80,"D":30},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">X travels 6 km on a bicycle with average speeds of 5 km per hour, 10 km per hour and 4 km per hour during the first 1 km, the next 2 km and the remaining 3 km, respectively. Y travels the same distances with average speeds of 4 km per hour, 10 km per hour and 5 km per hour, respectively. How many minutes early will Y complete the journey if both X and Y start at the same time?</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">3</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">4</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">5</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">6</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"B","Super Kalam":"A","Vision IAS":"D","UPSC Official":"D"},"status":"disagree"},"51":{"setAQ":51,"codeQNums":{"A":51,"B":21,"C":61,"D":31},"qHtml":"<div class=\"q-cat-tag q-cat-decision_making\">Decision Making</div><div class=\"q-lead\">Seven cubes are identical in shape. Out of these, the weight of each of the six cubes is equal and the weight of the remaining cube is less than the weight of any other cube. A balance is used to identify the lightest cube. What is the minimum number of attempts required to distinguish the odd cube with certainty?</div><div class=\"options\"><div class=\"option opt-disagree\"><span class=\"opt-key\">A</span><span class=\"opt-text\">2</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">3</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">4</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1</span></div></div>","category":"decision_making","answers":{"ONLY IAS (PW)":"A","Study IQ IAS":"D","Super Kalam":"A","Vision IAS":"A","UPSC Official":"A"},"status":"disagree"},"52":{"setAQ":52,"codeQNums":{"A":52,"B":22,"C":62,"D":32},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">Previous waves of customer-service technology, including email and those pesky voice menus, stoked concerns of job losses, only for them to fail to materialise. AI could yet prove different. And if it does, its effects may be salutary. Human agents could be freed up to spend more time on creative and rewarding tasks, like using feedback to make products and services better—and thereby spend less time listening to irate customers!</div><div class=\"q-lead\">Which one among the following statements most appropriately reflects the point of view of the given passage?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">If AI were to take over customer service, there would be no work left for human subjects to do.</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">Irritating voice menus and email could not achieve human redundancy to the extent that AI might.</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">The value of human intervention in the workplace affected by AI might be enhanced through redirection towards more fulfilling tasks.</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Unlike previous waves in customer-service technology, AI has raised the alarm of worker replacement.</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"53":{"setAQ":53,"codeQNums":{"A":53,"B":23,"C":63,"D":33},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">Previous waves of customer-service technology, including email and those pesky voice menus, stoked concerns of job losses, only for them to fail to materialise. AI could yet prove different. And if it does, its effects may be salutary. Human agents could be freed up to spend more time on creative and rewarding tasks, like using feedback to make products and services better—and thereby spend less time listening to irate customers!</div><div class=\"q-lead\">Which of the following conclusions, made on the basis of the given passage, is/are correct?\n1. The advent of new customer-service technology had invariably sparked fears about job losses.\n2. Often it is found that instead of job losses, alternative channels for employee engagement are discovered while certain tasks are replaced by technology.\n3. The advent of technology inevitably leads to stressful outcomes.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 3</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">3 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1 and 2</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"B","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"disagree"},"54":{"setAQ":54,"codeQNums":{"A":54,"B":24,"C":64,"D":34},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">Cattle from the nearby villages came to the common ground to graze, and there was still a cool freshness in the air. Hori took several deep breaths and thought of sitting down for a while, since he'd be dying of heat in the scorching 'loo' wind the rest of the day. A number of farmers were eager to lease this bit of land and had offered a good price, but Rai Sahib—God bless him—had plainly told them it was reserved for grazing and would not be relinquished for any price. If he'd been one of those selfish Zamindars, he'd have said the cattle could go to hell, that there was no reason for him to miss the chance to make a little money. But the Rai Sahib still held to the old values, feeling that any landlord who didn't look after his tenants was less than human.</div><div class=\"q-lead\">Which of the following conclusions is/are correct?\n1. All landlords essentially have some goodness trapped within them.\n2. The common grazing grounds of a village are intended for use by the cattle of that village.\n3. Landlords who believe in tradition tend to be more concerned about their tenants.\n4. Winds later in the day tend to be cooler post the hot winds of the morning.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 3</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 and 4</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">3 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">2 only</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"C","Super Kalam":"D","Vision IAS":"C/D","UPSC Official":"C"},"status":"disagree"},"55":{"setAQ":55,"codeQNums":{"A":55,"B":25,"C":65,"D":35},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">Cattle from the nearby villages came to the common ground to graze, and there was still a cool freshness in the air. Hori took several deep breaths and thought of sitting down for a while, since he'd be dying of heat in the scorching 'loo' wind the rest of the day. A number of farmers were eager to lease this bit of land and had offered a good price, but Rai Sahib—God bless him—had plainly told them it was reserved for grazing and would not be relinquished for any price. If he'd been one of those selfish Zamindars, he'd have said the cattle could go to hell, that there was no reason for him to miss the chance to make a little money. But the Rai Sahib still held to the old values, feeling that any landlord who didn't look after his tenants was less than human.</div><div class=\"q-lead\">Which of the following statements are not correct?\n1. The landholdings of Rai Sahib were currently not being used for farming.\n2. Temperamentally, Rai Sahib was as greedy as other landlords.\n3. It cannot be ascertained that Rai Sahib could have made some money by leasing out the grazing land.\n4. It may be asserted that Rai Sahib valued his tenants and wanted to protect their livelihood.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">1 and 3 only</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">3 and 4</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">1, 2 and 3</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"56":{"setAQ":56,"codeQNums":{"A":56,"B":26,"C":66,"D":36},"qHtml":"<div class=\"q-cat-tag q-cat-logical_reasoning\">Logical Reasoning</div><div class=\"q-lead\">A person facing the East travels 4 km straight and then turns right and travels 3 km, then further turns left and travels 2 km and finally turns left and travels 3 km. The minimum distance between the final point and the initial point, and the direction in which the person is facing at the final point are, respectively</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">12 km, East</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">6 km, East</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">8 km, North</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">6 km, North</span></div></div>","category":"logical_reasoning","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"57":{"setAQ":57,"codeQNums":{"A":57,"B":27,"C":67,"D":37},"qHtml":"<div class=\"q-cat-tag q-cat-general_mental_ability\">General Mental Ability</div><div class=\"q-lead\">In a sequence of numbers, each number other than the first two is the sum of the two immediately preceding numbers from it. If the first two numbers in the sequence are 4 and 7, then the sixth number is</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">29</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">37</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">43</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">47</span></div></div>","category":"general_mental_ability","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"58":{"setAQ":58,"codeQNums":{"A":58,"B":28,"C":68,"D":38},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">The ratio of male to female workers in two companies A and B is 13 : 10 and 7 : 5, respectively. If both the companies have the same number of female workers, then what is the ratio of the total number of workers in A to those in B?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">24 : 23</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">23 : 24</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">18 : 17</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">27 : 18</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B","Super Kalam":"B","Vision IAS":"B","UPSC Official":"B"},"status":"agree"},"59":{"setAQ":59,"codeQNums":{"A":59,"B":29,"C":69,"D":39},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">If the product of the HCF and LCM of two distinct numbers is the cube of one of the numbers, then which of the following statements is/are correct?\nI. The difference of the numbers is an even number.\nII. One of the numbers is a perfect square.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">I only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">II only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">Both I and II</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">Neither I nor II</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"60":{"setAQ":60,"codeQNums":{"A":60,"B":30,"C":70,"D":40},"qHtml":"<div class=\"q-cat-tag q-cat-basic_numeracy\">Basic Numeracy</div><div class=\"q-lead\">If x and y are two digits and the number 4x5y790 is divisible by 11, then what is the remainder, if x + y is divided by 11?</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">3</span></div><div class=\"option\"><span class=\"opt-key\">C</span><span class=\"opt-text\">5</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">7</span></div></div>","category":"basic_numeracy","answers":{"ONLY IAS (PW)":"D","Study IQ IAS":"D","Super Kalam":"D","Vision IAS":"D","UPSC Official":"D"},"status":"agree"},"61":{"setAQ":61,"codeQNums":{"A":61,"B":11,"C":51,"D":41},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">Was it the sun-dappled ambience, the strawberries and cream, the frustration of Flavio Cobolli's unforced errors against Serbian Novak Djokovic on Centre Court or simply the crushing weight of being a 64-year-old man in the third act of a very public life? Whatever the reason, Hugh Grant, the actor, deserves empathy. There he was, in the Royal Box at Wimbledon, flanked by Britain's well-dressed and well-rested spectators, watching the men's singles quarterfinals, when the actor did something quietly radical : head at a tilt, eyes closed, utterly unbothered, he took a nap. So praise be to Grant for serving up an unexpected ace. In that small, delicious moment, he didn't merely catch forty winks, he made an elegant case for surrender. Not to laziness, but to limits. To the body's quiet wisdom over society's relentless performance metrics. Wimbledon had its tennis. The perpetually sleep-deprived discovered a leading man, not of action, but of rest.</div><div class=\"q-lead\">Which of the following statements is/are correct?\n1. Radical action can also be attributed to mild surrender where one acts against societal expectations.\n2. Submitting to one's limitations, given the effect of age and other factors, ought not to be conflated with laziness.\n3. 'Leading man' usually refers to one who plays the lead role in a movie; in this instance the implication is that Hugh Grant is performing the role of not an action hero, but that of a resting one!\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2 only</span></div><div class=\"option\"><span class=\"opt-key\">B</span><span class=\"opt-text\">2 and 3 only</span></div><div class=\"option opt-agree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">1, 2 and 3</span></div><div class=\"option\"><span class=\"opt-key\">D</span><span class=\"opt-text\">3 only</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"C","Study IQ IAS":"C","Super Kalam":"C","Vision IAS":"C","UPSC Official":"C"},"status":"agree"},"62":{"setAQ":62,"codeQNums":{"A":62,"B":12,"C":52,"D":42},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">Was it the sun-dappled ambience, the strawberries and cream, the frustration of Flavio Cobolli's unforced errors against Serbian Novak Djokovic on Centre Court or simply the crushing weight of being a 64-year-old man in the third act of a very public life? Whatever the reason, Hugh Grant, the actor, deserves empathy. There he was, in the Royal Box at Wimbledon, flanked by Britain's well-dressed and well-rested spectators, watching the men's singles quarterfinals, when the actor did something quietly radical : head at a tilt, eyes closed, utterly unbothered, he took a nap. So praise be to Grant for serving up an unexpected ace. In that small, delicious moment, he didn't merely catch forty winks, he made an elegant case for surrender. Not to laziness, but to limits. To the body's quiet wisdom over society's relentless performance metrics. Wimbledon had its tennis. The perpetually sleep-deprived discovered a leading man, not of action, but of rest.</div><div class=\"q-lead\">Which of the following statements is/are correct?\n1. Hugh Grant was watching, from the Royal Box, the men's semifinal match on Centre Court between Flavio Cobolli and Novak Djokovic.\n2. The phrase 'unexpected ace' in the context uses a term from the game of tennis to highlight Hugh Grant's somewhat uncharacteristic act of catching 'forty winks'; an act that is viewed with opprobrium.\n3. Grant subjects the demands of society to the wisdom of his body.\nSelect the answer using the code given below.</div><div class=\"options\"><div class=\"option\"><span class=\"opt-key\">A</span><span class=\"opt-text\">1 and 2</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">B</span><span class=\"opt-text\">3 only</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">C</span><span class=\"opt-text\">2 and 3</span></div><div class=\"option opt-disagree\"><span class=\"opt-key\">D</span><span class=\"opt-text\">2 only</span></div></div>","category":"comprehension","answers":{"ONLY IAS (PW)":"B","Study IQ IAS":"B/D","Super Kalam":"C","Vision IAS":"B/C","UPSC Official":"B"},"status":"disagree"},"63":{"setAQ":63,"codeQNums":{"A":63,"B":13,"C":53,"D":43},"qHtml":"<div class=\"q-cat-tag q-cat-comprehension\">Comprehension</div><div class=\"q-passage\">The process by which countries close their labour-productivity gap with the technology leader is based on convergence theory. The convergence model divides economic eras into three phases : the breakaway, the catch-up, and the fine-tuning phase. It also divides economic entities into two categories : the technology leaders and the technology followers. The pro
