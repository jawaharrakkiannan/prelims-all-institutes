<style>

<body>
<!-- INJECT_CONFIG -->
<div id="app"></div>
<script>
const TOTAL_Q=PAPER_CONFIG.totalQ, PER_PAGE=PAPER_CONFIG.perPage, TOTAL_PAGES=PAPER_CONFIG.totalPages
const OPTIONS=['A','B','C','D']
const P=APP_CONFIG.primaryColor||'#f97316'

const OPT_BG  ={A:'#dbeafe',B:'#f3e8ff',C:'#ccfbf1',D:'#e0e7ff',skip:'#fef3c7'}
const OPT_TXT ={A:'#1e40af',B:'#6b21a8',C:'#0f766e',D:'#3730a3',skip:'#92400e'}

const STORE_KEY='upsc_t1_all_state_'+PAPER_CONFIG.paper
const APP_NAME=APP_CONFIG.name
document.title=APP_NAME

var scoreSent=false

const state={screen:'landing',paperCode:null,responses:{},page:1,sortCol:null,sortDir:1,editingPaper:false,editPaperReview:false,tableView:0,confirmingNewAttempt:false,showQuestions:false,filterSubject:'all',filterStatus:'all',subjTableCollapsed:false,accTableCollapsed:false,qTableCollapsed:false,subjSortCol:'attPct',subjSortDir:-1,accSortCol:'accPct',accSortDir:-1,selectedInstituteIdx:0,candidateName:'',candidatePhone:'',candidatePlace:'',candidatePlaceOther:'',profileErrors:{},profileSubmitted:false}

// Restore persisted state on load (window.__DL_STATE__ set by downloaded file takes priority)
try{
  var _p=window.__DL_STATE__||(localStorage.getItem(STORE_KEY)?JSON.parse(localStorage.getItem(STORE_KEY)):null)
  if(_p){
    state.paperCode=_p.paperCode||null
    state.responses=_p.responses||{}
    state.page=_p.page||1
    state.screen=_p.screen||'landing'
    state.sortCol=_p.sortCol||null
    state.sortDir=_p.sortDir||1
    state.tableView=_p.tableView||0
    state.showQuestions=_p.showQuestions||false
    state.filterSubject=_p.filterSubject||'all'
    state.filterStatus=_p.filterStatus||'all'
    state.subjTableCollapsed=false
    state.accTableCollapsed=false
    state.qTableCollapsed=false
    state.subjSortCol=_p.subjSortCol||'attPct'
    state.subjSortDir=_p.subjSortDir||-1
    state.accSortCol=_p.accSortCol||'accPct'
    state.accSortDir=_p.accSortDir||-1
    state.selectedInstituteIdx=_p.selectedInstituteIdx||0
    state.candidateName=_p.candidateName||''
    state.candidatePhone=_p.candidatePhone||''
    state.candidatePlace=_p.candidatePlace||''
    state.candidatePlaceOther=_p.candidatePlaceOther||''
    state.profileSubmitted=_p.profileSubmitted||false
  }
}catch(e){}

function saveState(){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify({
      paperCode:state.paperCode,responses:state.responses,
      page:state.page,screen:state.screen,
      sortCol:state.sortCol,sortDir:state.sortDir,tableView:state.tableView||0,
      showQuestions:state.showQuestions,filterSubject:state.filterSubject,filterStatus:state.filterStatus,subjTableCollapsed:state.subjTableCollapsed,accTableCollapsed:state.accTableCollapsed,qTableCollapsed:state.qTableCollapsed,subjSortCol:state.subjSortCol,subjSortDir:state.subjSortDir,accSortCol:state.accSortCol,accSortDir:state.accSortDir,selectedInstituteIdx:state.selectedInstituteIdx,candidateName:state.candidateName,candidatePhone:state.candidatePhone,candidatePlace:state.candidatePlace,candidatePlaceOther:state.candidatePlaceOther,profileSubmitted:state.profileSubmitted
    }))
  }catch(e){}
}

function validKey(k){
  if(!k) return null
  var n=String(k).trim().toUpperCase()
  return(n==='A'||n==='B'||n==='C'||n==='D')?n:null
}

function parseKey(k){
  if(!k) return null
  var parts=String(k).trim().toUpperCase().split('/')
  var valid=parts.filter(function(p){return p==='A'||p==='B'||p==='C'||p==='D'})
  if(!valid.length) return null
  return valid.length===1?valid[0]:valid
}

function isKeyEmpty(key){return Object.keys(key.answers).every(function(k){return !parseKey(key.answers[k])})}

function canonQ(pc,q){
  if(pc==='A') return q
  var m=PAPER_MAPPING[pc]
  return m&&m[q]?Number(m[q]):q
}

function calcScore(key){
  var correct=0,wrong=0,skip=0,ambig=0
  for(var q=1;q<=TOTAL_Q;q++){
    var c=canonQ(state.paperCode,q),s=state.responses[q],k=parseKey(key.answers[c])
    if(!k) continue  // dropped — not evaluated
    if(!s){ skip++; continue }
    if(Array.isArray(k)){
      if(k.indexOf(s)!==-1){ correct++; ambig++ }  // matches one option — uncertain
      else wrong++
    } else {
      if(s===k) correct++
      else wrong++
    }
  }
  var maxScore=correct*PAPER_CONFIG.correctMark-wrong*PAPER_CONFIG.wrongMark
  var minScore=(correct-ambig)*PAPER_CONFIG.correctMark-(wrong+ambig)*PAPER_CONFIG.wrongMark
  return{correct:correct,wrong:wrong,skip:skip,score:maxScore,
    minScore:ambig>0?minScore:null,maxScore:ambig>0?maxScore:null,isRange:ambig>0}
}

function buildRows(keys){
  var rows=[]
  for(var q=1;q<=TOTAL_Q;q++){
    var c=canonQ(state.paperCode,q),s=state.responses[q]||'-'
    var row={q:q,c:c,s:s}
    keys.forEach(function(key,i){
      var ka=parseKey(key.answers[c])
      var kaStr=Array.isArray(ka)?ka.join('/'):ka
      row['ka'+i]=kaStr||'&mdash;'
      var res
      if(!ka) res='dropped'
      else if(!state.responses[q]) res='skip'
      else if(Array.isArray(ka)) res=ka.indexOf(state.responses[q])!==-1?'ambig':'wrong'
      else res=state.responses[q]===ka?'correct':'wrong'
      row['kr'+i]=res
    })
    rows.push(row)
  }
  return rows
}

function getResult(setAQ){
  var avail=[].concat(INSTITUTES_KEYS,[OFFICIAL_KEY]).filter(function(k){return !isKeyEmpty(k)})
  if(!avail.length) return 'nokey'
  var key=avail[0]
  var keyAns=validKey(key.answers[setAQ])
  if(!keyAns) return 'nokey'
  var studentQ=setAQ
  if(state.paperCode!=='A'){
    var m=PAPER_MAPPING[state.paperCode]||{}
    var found=Object.keys(m).filter(function(sq){return m[sq]==setAQ})
    if(found.length) studentQ=parseInt(found[0])
  }
  var ans=state.responses[studentQ]
  if(!ans) return 'skip'
  return ans===keyAns?'correct':'wrong'
}

function pageAnswered(p){
  for(var q=(p-1)*PER_PAGE+1;q<=p*PER_PAGE;q++) if(!state.responses[q]) return false
  return true
}

function postScore(){
  if(scoreSent) return
  scoreSent=true
  var scOff=isKeyEmpty(OFFICIAL_KEY)?null:calcScore(OFFICIAL_KEY)
  var ctrl=new AbortController();setTimeout(function(){ctrl.abort()},10000)
  fetch(SUPABASE_CONFIG.url+'/rest/v1/'+SUPABASE_CONFIG.table,{
    signal:ctrl.signal,
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':SUPABASE_CONFIG.anonKey,
      'Authorization':'Bearer '+SUPABASE_CONFIG.anonKey,
      'Prefer':'return=minimal'
    },
    body:JSON.stringify({
      paper:PAPER_CONFIG.paper,
      paper_code:state.paperCode,
      skipped:PAPER_CONFIG.totalQ-Object.keys(state.responses).length,
      attempted:Object.keys(state.responses).length,
      correct_official:scOff?scOff.correct:null,
      wrong_official:scOff?scOff.wrong:null,
      score_official:scOff?Math.round(scOff.score*100)/100:null,
      responses:state.responses,
      candidate_name:state.candidateName||null,
      candidate_phone:state.candidatePhone||null,
      candidate_place:state.candidatePlace||null
    })
  }).then(function(r){
    if(!r.ok) scoreSent=false
  }).catch(function(){
    scoreSent=false
  })
}

function showRenderError(){
  var el=document.getElementById('app')
  if(!el) return
  el.textContent=''
  var wrap=document.createElement('div')
  wrap.setAttribute('style','display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;background:#F7F3EA')
  var h=document.createElement('p');h.setAttribute('style','font-size:16px;font-weight:700;color:#1A1D2B;margin-bottom:8px');h.textContent='Something went wrong'
  var s=document.createElement('p');s.setAttribute('style','font-size:13px;color:#5B6375;margin-bottom:20px');s.textContent='Your responses are saved. Tap reload to continue.'
  var b=document.createElement('button');b.setAttribute('style','padding:12px 24px;background:'+P+';color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer');b.textContent='Reload';b.onclick=function(){location.reload()}
  wrap.appendChild(h);wrap.appendChild(s);wrap.appendChild(b);el.appendChild(wrap)
}

function render(){
  try{
    saveState()
    var app=document.getElementById('app')
    if(state.screen==='landing') app.innerHTML=renderLanding()
    else if(state.screen==='entry') app.innerHTML=renderEntry()
    else if(state.screen==='review') app.innerHTML=renderReview()
    else if(state.screen==='result'){app.innerHTML=renderResult();if(!shouldShowProfile()||state.profileSubmitted)postScore()}
    bind()
  }catch(e){showRenderError()}
}

// ── Result ───────────────────────────────────────────────────────────────────
function renderResult(){
  var instKs=INSTITUTES_KEYS.filter(function(k){return !isKeyEmpty(k)})
  var avail=instKs.concat(!isKeyEmpty(OFFICIAL_KEY)?[OFFICIAL_KEY]:[])

  var rows=avail.length>0?buildRows(avail):[]
  if(state.sortCol!==null){
    rows.sort(function(a,b){
      var av=a[state.sortCol],bv=b[state.sortCol]
      if(av<bv) return -state.sortDir
      if(av>bv) return state.sortDir
      return 0
    })
  }

  function sortArrow(col){
    if(state.sortCol!==col) return ''
    return state.sortDir===1?' &#8593;':' &#8595;'
  }
  function sArr(col){return col===state.subjSortCol?(state.subjSortDir===1?' &#8593;':' &#8595;'):''}
  function aArr(col){return col===state.accSortCol?(state.accSortDir===1?' &#8593;':' &#8595;'):''}

  // ── Score table (one row per institute + official) ──────────────────────────
  var totalMarks=TOTAL_Q*PAPER_CONFIG.correctMark
  var scoreRows=''
  INSTITUTES_KEYS.forEach(function(key){
    var pending=isKeyEmpty(key)
    if(pending){
      scoreRows+='<tr>' +
        '<td style="font-family:\'DM Sans\',sans-serif;font-size:12px;font-weight:600;color:#1C1510;">'+key.name+'</td>' +
        '<td colspan="4" style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-size:11px;color:#9CA3AF;letter-spacing:1.5px;">&#9203;&nbsp;Key not yet uploaded</td>' +
      '</tr>'
    }else{
      var sc=calcScore(key)
      var scoreCell=sc.isRange
        ?'<span style="font-family:\'JetBrains Mono\',monospace;font-size:13px;font-weight:800;color:#92400e;">'+sc.minScore.toFixed(2)+'&ndash;'+sc.maxScore.toFixed(2)+'</span><span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;font-weight:700;color:#9CA3AF;margin-left:2px;">/'+totalMarks+'</span>'

        '<td style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-weight:700;color:#9CA3AF;">'+st.skip+'</td>' +
        '<td style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-weight:700;color:'+attColor+';">'+attPct+'%</td>' +
      '</tr>'
    }).join('')
    if(PAPER_CONFIG.paper!=='CSAT') subjectSection='<div class="bk-card" style="margin-bottom:14px;">' +
      '<div class="bk-hd" style="display:flex;align-items:center;justify-content:space-between;">' +
        '<span class="bk-title">Subject-wise Attempt Breakdown</span>' +
        '<button id="subj-toggle" style="background:rgba(0,0,0,.12);border:1px solid var(--c-on-accent);border-radius:6px;padding:4px 10px;font-family:\'JetBrains Mono\',monospace;font-size:11px;font-weight:700;color:var(--c-on-accent);cursor:pointer;line-height:1;letter-spacing:.5px;">'+(state.subjTableCollapsed?'&#9660; Show':'&#9650; Hide')+'</button>' +
      '</div>' +
      (state.subjTableCollapsed?'':
        (activeKeyAvail
          ? '<div class="tbl-wrap"><table>' +
              '<thead><tr>' +
                '<th style="text-align:left;white-space:normal;">Subject</th>' +
                '<th data-scol="total" style="text-align:center;white-space:normal;cursor:pointer;">Total<br>Qs'+sArr('total')+'</th>' +
                '<th data-scol="correct" style="text-align:center;white-space:normal;cursor:pointer;">&#10003;'+sArr('correct')+'</th>' +
                '<th data-scol="wrong" style="text-align:center;white-space:normal;cursor:pointer;">&#10007;'+sArr('wrong')+'</th>' +
                '<th data-scol="skip" style="text-align:center;white-space:normal;cursor:pointer;">Not<br>Attempted'+sArr('skip')+'</th>' +
                '<th data-scol="attPct" style="text-align:center;white-space:normal;cursor:pointer;">Attempt<br>%'+sArr('attPct')+'</th>' +
              '</tr></thead>' +
              '<tbody>'+sbody+'</tbody>' +
            '</table></div>'
          : '<div style="padding:28px 20px;text-align:center;"><p style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:#9CA3AF;letter-spacing:1.5px;line-height:1.8;">&#9203; '+(tv===1?'Official UPSC key':'Institute key')+' not yet released.<br>Will be updated once published. Come back later &amp; refresh the page to see your results.</p></div>')) +
    '</div>'

    var aList=subjOrder.slice()
    if(state.accSortCol){
      aList.sort(function(a,b){
        var sa=subjStats[a],sb=subjStats[b],va,vb
        if(state.accSortCol==='total'){va=sa.total;vb=sb.total}
        else if(state.accSortCol==='correct'){va=sa.correct;vb=sb.correct}
        else if(state.accSortCol==='wrong'){va=sa.wrong;vb=sb.wrong}
        else if(state.accSortCol==='accPct'){va=sa.total>0?sa.correct/sa.total:0;vb=sb.total>0?sb.correct/sb.total:0}
        return state.accSortDir*(va-vb)
      })
    }
    var abody=aList.map(function(sid){
      var st=subjStats[sid]
      var pct=st.total>0?(st.correct/st.total*100).toFixed(1):0
      var pctColor=pct>=70?'#15803d':pct>=40?'var(--c-accent)':'#dc2626'
      return '<tr>' +
        '<td style="font-family:\'DM Sans\',sans-serif;font-weight:600;color:#1C1510;padding:11px 16px;vertical-align:middle;">'+st.name+'</td>' +
        '<td style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-weight:700;color:#1C1510;">'+st.total+'</td>' +
        '<td style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-weight:700;color:#15803d;">'+st.correct+'</td>' +
        '<td style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-weight:700;color:#dc2626;">'+st.wrong+'</td>' +
        '<td style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-weight:800;color:'+pctColor+';">'+pct+'%</td>' +
      '</tr>'
    }).join('')
    if(PAPER_CONFIG.paper!=='CSAT') accuracySection='<div class="bk-card" style="margin-bottom:14px;">' +
      '<div class="bk-hd" style="display:flex;align-items:center;justify-content:space-between;">' +

        '<button id="acc-toggle" style="background:rgba(0,0,0,.12);border:1px solid var(--c-on-accent);border-radius:6px;padding:4px 10px;font-family:\'JetBrains Mono\',monospace;font-size:11px;font-weight:700;color:var(--c-on-accent);cursor:pointer;line-height:1;letter-spacing:.5px;">'+(state.accTableCollapsed?'&#9660; Show':'&#9650; Hide')+'</button>' +
      '</div>' +
      (state.accTableCollapsed?'':
        (activeKeyAvail
          ? '<div class="tbl-wrap"><table>' +
              '<thead><tr>' +
                '<th style="text-align:left;white-space:normal;">Subject</th>' +
                '<th data-acol="total" style="text-align:center;white-space:normal;cursor:pointer;">Total<br>Qs'+aArr('total')+'</th>' +
                '<th data-acol="correct" style="text-align:center;white-space:normal;cursor:pointer;">&#10003;'+aArr('correct')+'</th>' +
                '<th data-acol="wrong" style="text-align:center;white-space:normal;cursor:pointer;">&#10007;'+aArr('wrong')+'</th>' +
                '<th data-acol="accPct" style="text-align:center;white-space:normal;cursor:pointer;">Accuracy<br>%'+aArr('accPct')+'</th>' +
              '</tr></thead>' +
              '<tbody>'+abody+'</tbody>' +
            '</table></div>'
          : '<div style="padding:28px 20px;text-align:center;"><p style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:#9CA3AF;letter-spacing:1.5px;line-height:1.8;">&#9203; '+(tv===1?'Official UPSC key':'Institute key')+' not yet released.<br>Will be updated once published. Come back later &amp; refresh the page to see your results.</p></div>')) +
    '</div>'
  } else {
    var pendingInstMsg=instKs.length===0?'Institute keys not yet uploaded.':''
    var pendingOffMsg=isKeyEmpty(OFFICIAL_KEY)?'Official UPSC key not yet released.':''
    var pendingMsgs=[pendingInstMsg,pendingOffMsg].filter(Boolean).join(' ')
    tableSection='<div class="bk-card">' +
      '<div class="bk-hd"><span class="bk-title">Analysis Unavailable</span></div>' +
      '<div style="padding:28px 20px;text-align:center;">' +
        '<p style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:#9CA3AF;letter-spacing:1.5px;line-height:1.8;">&#9203; '+pendingMsgs+'<br>Come back after the key is released &amp; refresh the page to see your results.</p>' +
      '</div>' +
    '</div>'
  }

  return '<div style="background:#F7F3EA;min-height:100vh;">' +
    '<div style="background:var(--c-accent);box-shadow:inset 0 -3px 0 rgba(0,0,0,.18);">' +
      '<div style="max-width:860px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;">' +
        '<div>' +
          '<h1 style="font-family:\'Playfair Display\',serif;font-size:17px;font-weight:700;color:var(--c-on-accent);line-height:1.2;">'+APP_CONFIG.name+'</h1>' +
          '<p style="font-size:12px;color:var(--c-on-accent);opacity:.6;margin-top:2px;">'+APP_CONFIG.examName+' &mdash; '+APP_CONFIG.examPaper+' &mdash; <span style="font-family:\'JetBrains Mono\',monospace;font-weight:700;color:var(--c-on-accent);">Set '+state.paperCode+'</span></p>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">' +
          (avail.length>0?'<button id="dl-btn" class="btn-sm" style="border:1.5px solid var(--c-on-accent);color:var(--c-on-accent);background:rgba(0,0,0,.12);">&#8595; Download</button>':'') +
          '<button id="edit-responses-btn" style="background:rgba(0,0,0,.12);border:1px solid var(--c-on-accent);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--c-on-accent);cursor:pointer;white-space:nowrap;">&#9998; Edit</button>' +
          '<button id="logout-btn" style="background:rgba(0,0,0,.12);border:1px solid var(--c-on-accent);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--c-on-accent);cursor:pointer;white-space:nowrap;">&#8592; Home</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div style="max-width:860px;margin:0 auto;padding:12px 16px 0;">' +
      '<div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:16px;flex-shrink:0;">&#9993;</span>' +
        '<p style="font-size:12px;color:#0c4a6e;line-height:1.5;margin:0;">Facing any issues with the score calculation? Mail us at <a href="mailto:'+APP_CONFIG.contactEmail+'" style="color:#0284c7;font-weight:700;text-decoration:none;">'+APP_CONFIG.contactEmail+'</a> — you\'ll receive a quick reply.</p>' +
      '</div>' +
    '</div>' +
    '<div style="max-width:860px;margin:0 auto;padding:14px 16px 14px;">'+cards+'</div>' +
    (avail.length>0
      ? '<div style="max-width:860px;margin:0 auto;padding:0 16px 10px;">' +
          '<div style="background:#fff7ed;border:1.5px solid '+P+';border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;">' +
            '<div>' +
              '<p style="font-size:13px;font-weight:700;color:'+P+';margin-bottom:2px;">Save your result</p>' +
              '<p style="font-size:11px;color:'+P+';opacity:.75;line-height:1.5;">Download to review anytime, even without internet.</p>' +
            '</div>' +
            '<button id="dl-btn-banner" style="flex-shrink:0;padding:9px 16px;background:'+P+';color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">&#8595;&nbsp;Download</button>' +
          '</div>' +
        '</div>'
      : '') +
    (avail.length>0?keyBtnSection:'') +
    '<div style="max-width:860px;margin:0 auto;padding:0 16px 40px;">'+subjectSection+accuracySection+tableSection+
      '<p style="text-align:center;font-size:11px;color:#9CA3AF;margin-top:20px;">'+APP_CONFIG.name+' &middot; '+APP_CONFIG.contactEmail+'</p>' +
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px;">' +
        '<a href="/" style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:#fff;border:1.5px solid #E6E0D5;color:#1A1D2B;border-radius:10px;font-family:\'JetBrains Mono\',monospace;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;">&#8962; Home</a>' +
        '<a href="'+(PAPER_CONFIG.paper==='GS'?'/csat':'/gs1')+'" style="display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:'+P+';color:#fff;border-radius:10px;font-family:\'JetBrains Mono\',monospace;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-decoration:none;">' +
          'Check '+(PAPER_CONFIG.paper==='GS'?'CSAT Paper 2':'GS Paper 1')+' <span style="font-size:14px;">&#8594;</span>' +
        '</a>' +
      '</div>' +
    '</div>' +
  '</div>' +
  renderProfileModal()
}

// ── Profile Modal ─────────────────────────────────────────────────────────────
function renderProfileModal(){
  if(!shouldShowProfile()||state.profileSubmitted) return ''
  var places=['Chennai','Delhi / NCR','Bangalore / Hyderabad','Trivandrum','Others']
  var errs=state.profileErrors||{}
  var nameVal=(state.candidateName||'').replace(/"/g,'&quot;')
  var phoneVal=(state.candidatePhone||'').replace(/"/g,'&quot;')

  var placeHtml=places.map(function(p){
    var sel=state.candidatePlace===p
    return '<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;border:1.5px solid '+(sel?P:'#E6E0D5')+';background:'+(sel?'#fff7ed':'#fff')+';cursor:pointer;margin-bottom:7px;">' +
      '<input type="radio" name="prof-place" data-place="'+p+'" '+(sel?'checked':'')+' style="accent-color:'+P+';width:15px;height:15px;flex-shrink:0;">' +
      '<span style="font-size:13.5px;font-weight:'+(sel?'700':'500')+';color:#1A1D2B;">'+p+'</span>' +
    '</label>'
  }).join('')

  var otherBox=state.candidatePlace==='Others'
    ? '<div style="margin:-3px 0 7px 0;">' +
        '<input id="profile-place-other" type="text" placeholder="Enter your city / place" value="'+(state.candidatePlaceOther||'').replace(/"/g,'&quot;')+'" ' +
        'style="width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid '+(errs.place?'#dc2626':'#E6E0D5')+';font-size:14px;outline:none;font-family:inherit;">' +
      '</div>'
    : ''

  return '<div id="profile-modal" style="position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(11,25,41,.6);backdrop-filter:blur(3px);">' +
    '<div style="background:#F7F3EA;border-radius:18px;padding:24px 22px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.3);">' +
      '<p style="font-family:\'Playfair Display\',serif;font-size:18px;font-weight:700;color:#1A1D2B;margin-bottom:3px;">One last step</p>' +
      '<p style="font-size:12.5px;color:#5B6375;margin-bottom:18px;">Help us understand who is using this tool.</p>' +
      '<div style="margin-bottom:15px;">' +
        '<label style="display:block;font-size:10.5px;font-weight:700;color:#5B6375;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;">Name</label>' +
        '<input id="profile-name" type="text" placeholder="e.g. Priya Sharma" value="'+nameVal+'" autocomplete="name" ' +
        'style="width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid '+(errs.name?'#dc2626':'#E6E0D5')+';font-size:14px;outline:none;font-family:inherit;background:#fff;">' +
        (errs.name?'<p style="font-size:11px;color:#dc2626;margin-top:4px;">'+errs.name+'</p>':'') +
      '</div>' +
      '<div style="margin-bottom:15px;">' +
        '<label style="display:block;font-size:10.5px;font-weight:700;color:#5B6375;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;">Phone Number</label>' +
        '<input id="profile-phone" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit mobile number" value="'+phoneVal+'" autocomplete="tel" ' +
        'style="width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid '+(errs.phone?'#dc2626':'#E6E0D5')+';font-size:14px;outline:none;font-family:inherit;background:#fff;">' +
        (errs.phone?'<p style="font-size:11px;color:#dc2626;margin-top:4px;">'+errs.phone+'</p>':'') +
      '</div>' +
      '<div style="margin-bottom:16px;">' +
        '<label style="display:block;font-size:10.5px;font-weight:700;color:#5B6375;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">Place</label>' +
        placeHtml + otherBox +
        (errs.place?'<p style="font-size:11px;color:#dc2626;margin-top:2px;">'+errs.place+'</p>':'') +
      '</div>' +
      '<button id="profile-submit" style="width:100%;padding:13px;background:'+P+';color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.01em;">Continue to Score &rarr;</button>' +
    '</div>' +
  '</div>'
}

// ── Event binding ────────────────────────────────────────────────────────────
function shouldShowProfile(){
  var att=Object.keys(state.responses).length
  return PAPER_CONFIG.paper==='CSAT'?att>=30:att>=75
}

function bind(){
  qsa('[data-paper]').forEach(function(b){b.addEventListener('click',function(){state.paperCode=b.dataset.paper;render()})})
  on('edit-paper-entry','click',function(){state.editingPaper=true;render()})
  qsa('[data-setpaper-entry]').forEach(function(b){b.addEventListener('click',function(){state.paperCode=b.dataset.setpaperEntry;state.editingPaper=false;render()})})
  on('edit-paper-review','click',function(){state.editPaperReview=true;render()})
  qsa('[data-setpaper-review]').forEach(function(b){b.addEventListener('click',function(){state.paperCode=b.dataset.setpaperReview;state.editPaperReview=false;render()})})
  on('start-btn','click',function(){if(!state.paperCode)return;state.screen='entry';state.page=1;render()})
  on('view-result-btn','click',function(){state.screen='result';top0();render()})
  on('new-attempt-btn','click',function(){state.confirmingNewAttempt=true;render()})
  on('confirm-new-attempt-yes','click',function(){
    try{localStorage.removeItem(STORE_KEY)}catch(e){}
    scoreSent=false
    state.screen='landing';state.paperCode=null;state.responses={};state.page=1
    state.sortCol=null;state.sortDir=1;state.editingPaper=false;state.editPaperReview=false;state.confirmingNewAttempt=false
    state.showQuestions=false;state.filterSubject='all';state.filterStatus='all'
    state.subjSortCol=null;state.subjSortDir=-1;state.accSortCol=null;state.accSortDir=-1
    state.candidateName='';state.candidatePhone='';state.candidatePlace='';state.candidatePlaceOther='';state.profileErrors={};state.profileSubmitted=false
    render()
  })
  on('confirm-new-attempt-no','click',function(){state.confirmingNewAttempt=false;render()})

  qsa('[data-q][data-opt]').forEach(function(b){
    b.addEventListener('click',function(){
      var q=parseInt(b.dataset.q),opt=b.dataset.opt
      if(state.responses[q]===opt) delete state.responses[q]
      else state.responses[q]=opt
      render()
    })
  })
  on('prev-btn','click',function(){if(state.page>1){state.page--;top0();render()}})
  on('next-btn','click',function(){state.page++;top0();render()})
  on('review-btn','click',function(){state.editingPaper=false;state.screen='review';top0();render()})
  on('to-review','click',function(){state.editingPaper=false;state.screen='review';top0();render()})
  qsa('[data-pg]').forEach(function(b){b.addEventListener('click',function(){state.page=parseInt(b.dataset.pg);top0();render()})})

  qsa('[data-goto]').forEach(function(t){
    t.addEventListener('click',function(){
      var q=parseInt(t.dataset.goto)
      state.page=Math.ceil(q/PER_PAGE);state.screen='entry';top0();render()
    })
  })
  on('back-btn','click',function(){state.editPaperReview=false;state.screen='entry';state.page=1;top0();render()})
  on('submit-btn','click',function(){state.editPaperReview=false;state.screen='result';top0();render()})

  qsa('[data-place]').forEach(function(r){
    r.addEventListener('click',function(){
      var nameEl=document.getElementById('profile-name')
      var phoneEl=document.getElementById('profile-phone')
      var otherEl=document.getElementById('profile-place-other')
      if(nameEl) state.candidateName=nameEl.value
      if(phoneEl) state.candidatePhone=phoneEl.value
      if(otherEl) state.candidatePlaceOther=otherEl.value
      state.candidatePlace=r.dataset.place
      state.profileErrors={}
      render()
    })
  })
  on('profile-submit','click',function(){
    var nameEl=document.getElementById('profile-name')
    var phoneEl=document.getElementById('profile-phone')
    var otherEl=document.getElementById('profile-place-other')
    var name=nameEl?nameEl.value:state.candidateName
    var phone=phoneEl?phoneEl.value:state.candidatePhone
    var placeOther=otherEl?otherEl.value:state.candidatePlaceOther
    state.candidateName=name
    state.candidatePhone=phone
    state.candidatePlaceOther=placeOther
    var errs={}
    var nt=name.trim()
    if(!nt) errs.name='Name is required.'
    else if(!/^[a-zA-Z ]+$/.test(nt)) errs.name='Only letters and spaces allowed.'
    var pt=phone.trim()
    if(!pt) errs.phone='Phone number is required.'
    else if(!/^\d{10}$/.test(pt)) errs.phone='Enter a valid 10-digit number.'
    else if(!/^[6-9]/.test(pt)) errs.phone='Enter a valid Indian mobile number.'
    else if(pt.startsWith('9876')) errs.phone='Enter a valid mobile number.'
    var pl=state.candidatePlace
    if(!pl) errs.place='Select your place.'
    else if(pl==='Others'&&!placeOther.trim()) errs.place='Please enter your city / place.'
    if(Object.keys(errs).length){state.profileErrors=errs;render();return}
    state.profileErrors={}
    state.candidateName=nt
    state.candidatePhone=pt
    state.candidatePlace=pl==='Others'?placeOther.trim():pl
    state.profileSubmitted=true
    postScore()
    render()
  })

  qsa('th[data-col]').forEach(function(th){
    th.addEventListener('click',function(){
      var col=th.dataset.col
      if(state.sortCol===col) state.sortDir=-state.sortDir
      else{state.sortCol=col;state.sortDir=1}
      render()
    })
  })
  qsa('[data-view]').forEach(function(b){b.addEventListener('click',function(){
    var tv=parseInt(b.dataset.view)
    state.tableView=tv
    render()
  })})
  qsa('[data-inst-idx]').forEach(function(b){b.addEventListener('click',function(){
    state.selectedInstituteIdx=parseInt(b.dataset.instIdx)
    render()
  })})
  on('dl-btn','click',downloadResult)
  on('dl-btn-banner','click',downloadResult)
  on('edit-responses-btn','click',function(){state.screen='entry';state.page=1;top0();render()})
  on('logout-btn','click',function(){
    state.screen='landing';top0();render()
  })
  var showQEl=document.getElementById('show-questions-chk')
  if(showQEl) showQEl.addEventListener('change',function(){state.showQuestions=this.checked;render()})
  qsa('[data-subject]').forEach(function(b){b.addEventListener('click',function(){state.filterSubject=b.dataset.subject;render()})})
  qsa('[data-status]').forEach(function(b){b.addEventListener('click',function(){state.filterStatus=b.dataset.status;render()})})
  on('subj-toggle','click',function(){state.subjTableCollapsed=!state.subjTableCollapsed;render()})
  on('acc-toggle','click',function(){state.accTableCollapsed=!state.accTableCollapsed;render()})
  on('q-toggle','click',function(){state.qTableCollapsed=!state.qTableCollapsed;render()})
  qsa('[data-scol]').forEach(function(b){b.addEventListener('click',function(){
    var col=b.dataset.scol
    if(state.subjSortCol===col) state.subjSortDir*=-1
    else{state.subjSortCol=col;state.subjSortDir=-1}
    render()
  })})
  qsa('[data-acol]').forEach(function(b){b.addEventListener('click',function(){
    var col=b.dataset.acol
    if(state.accSortCol===col) state.accSortDir*=-1
    else{state.accSortCol=col;state.accSortDir=-1}
    render()
  })})
}

// ── Download ─────────────────────────────────────────────────────────────────
function downloadResult(){
  var snap=JSON.stringify({
    screen:'result',
    paperCode:state.paperCode,
    responses:state.responses,
    page:state.page,
    sortCol:state.sortCol,
    sortDir:state.sortDir,
    tableView:state.tableView,
    showQuestions:state.showQuestions,
    filterSubject:state.filterSubject,
    filterStatus:state.filterStatus,
    subjTableCollapsed:state.subjTableCollapsed,
    accTableCollapsed:state.accTableCollapsed,
    qTableCollapsed:state.qTableCollapsed,
    subjSortCol:state.subjSortCol,
    subjSortDir:state.subjSortDir,
    accSortCol:state.accSortCol,
    accSortDir:state.accSortDir,
    selectedInstituteIdx:state.selectedInstituteIdx
  }).replace(/<\//g,'<\\/')

  var src=document.documentElement.outerHTML
  var inject='<script>window.__DL_STATE__='+snap+';<\/script>'
  src=src.replace('<\/head>',inject+'<\/head>')

  var blob=new Blob([src],{type:'text/html'})
  var url=URL.createObjectURL(blob)
  var a=document.createElement('a')
  a.href=url;a.download='score-result-set'+state.paperCode+'.html'
  document.body.appendChild(a);a.click()
  document.body.removeChild(a);URL.revokeObjectURL(url)
}

function hexToHSL(hex) {
  var r=parseInt(hex.slice(1,3),16)/255
  var g=parseInt(hex.slice(3,5),16)/255
  var b=parseInt(hex.slice(5,7),16)/255
  var max=Math.max(r,g,b), min=Math.min(r,g,b)
  var l=(max+min)/2, s=0, h=0
  if(max!==min){
    var d=max-min
    s=l>0.5?d/(2-max-min):d/(max+min)
    if(max===r) h=(g-b)/d+(g<b?6:0)
    else if(max===g) h=(b-r)/d+2
    else h=(r-g)/d+4
    h/=6
  }
  return {h:h*360, s:s*100, l:l*100}
}

function getLuminance(hex) {
  var r=parseInt(hex.slice(1,3),16)/255
  var g=parseInt(hex.slice(3,5),16)/255
  var b=parseInt(hex.slice(5,7),16)/255
  function lin(c){return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4)}
  return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b)
}

function buildTheme() {
  var hex=(APP_CONFIG.primaryColor||'').match(/^#[0-9a-fA-F]{6}$/)
    ? APP_CONFIG.primaryColor : '#1e40af'
  var H=Math.round(hexToHSL(hex).h)
  function hp(name,s,l){
    document.documentElement.style.setProperty(name,'hsl('+H+','+s+'%,'+l+'%)')
  }
  document.documentElement.style.setProperty('--c-accent', hex)
  hp('--c-accent-dark',      85, 28)
  hp('--c-accent-bg',        28, 92)
  hp('--c-accent-border',    22, 80)
  hp('--c-accent-border-th', 32, 68)
  hp('--c-accent-muted',     16, 53)
  hp('--c-accent-text-dark', 22, 28)
  hp('--c-accent-divider',   18, 89)
  hp('--c-accent-hover-bg',  28, 87)
  document.documentElement.style.setProperty(
    '--c-on-accent', getLuminance(hex)>0.40 ? '#1C1510' : '#ffffff'
  )
}

buildTheme()
render()
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')render()})
window.addEventListener('pageshow',function(e){if(e.persisted)render()})
window.addEventListener('unhandledrejection',function(){try{render()}catch(_e){}})
